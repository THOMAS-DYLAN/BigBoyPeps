<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — BigBoyPeps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── CART HEADER ─────────────────────────────── */
    .cart-header {
      padding: 52px 0 36px; border-bottom: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .cart-header-graffiti {
      position: absolute; font-family: var(--font-m);
      color: var(--red); opacity: .04; pointer-events: none; user-select: none;
    }
    .cart-header-inner { position: relative; z-index: 1; }
    .cart-page-eyebrow {
      font-family: var(--font-c); font-size: .68rem; font-weight: 700;
      letter-spacing: .28em; text-transform: uppercase; color: var(--red);
      margin-bottom: 10px; display: flex; align-items: center; gap: 10px;
    }
    .cart-page-eyebrow::before { content: ''; width: 28px; height: 2px; background: var(--red); }
    .cart-page-title {
      font-family: var(--font-d); font-size: clamp(2.5rem,6vw,5rem);
      line-height: .92; letter-spacing: .03em; color: var(--white);
    }
    .cart-page-title em { color: var(--red); font-style: normal; }

    /* ── CART BODY ───────────────────────────────── */
    .cart-body { padding: 48px 0 80px; flex: 1; }
    .cart-layout {
      display: grid; grid-template-columns: 1fr 360px; gap: 40px; align-items: start;
    }

    /* items */
    .cart-items-head {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .cart-items-label {
      font-family: var(--font-c); font-size: .68rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: var(--smoke);
    }
    .clear-cart-btn {
      font-family: var(--font-c); font-size: .66rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase; color: var(--smoke);
      text-decoration: underline; text-underline-offset: 3px; transition: color .18s;
    }
    .clear-cart-btn:hover { color: var(--red); }

    .cart-item {
      display: grid; grid-template-columns: 72px 1fr auto;
      gap: 16px; padding: 20px 0; border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .cart-item-thumb {
      width: 72px; height: 72px; background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;
    }
    .cart-item-info { min-width: 0; }
    .cart-item-name {
      font-family: var(--font-c); font-size: .92rem; font-weight: 700;
      letter-spacing: .04em; text-transform: uppercase; color: var(--white); margin-bottom: 3px;
    }
    .cart-item-research { font-size: .66rem; color: var(--smoke); font-style: italic; margin-bottom: 10px; }
    .cart-item-controls { display: flex; align-items: center; gap: 10px; }
    .qty-btn {
      width: 26px; height: 26px; border: 1px solid var(--border); color: var(--ash);
      font-size: .95rem; display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .qty-btn:hover { border-color: var(--red); color: var(--red); }
    .qty-val {
      font-family: var(--font-c); font-size: .88rem; font-weight: 700;
      color: var(--white); min-width: 20px; text-align: center;
    }
    .cart-item-right { text-align: right; }
    .cart-item-price {
      font-family: var(--font-d); font-size: 1.3rem; color: var(--white);
      letter-spacing: .04em; margin-bottom: 8px;
    }
    .remove-btn {
      font-family: var(--font-c); font-size: .62rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; color: var(--smoke);
      text-decoration: underline; text-underline-offset: 3px; transition: color .15s;
    }
    .remove-btn:hover { color: var(--red); }

    /* empty state */
    .cart-empty {
      text-align: center; padding: 80px 0; grid-column: 1 / -1;
    }
    .cart-empty-icon {
      font-size: 3rem; margin-bottom: 20px; opacity: .3;
    }
    .cart-empty h2 {
      font-family: var(--font-d); font-size: 1.8rem; letter-spacing: .06em;
      color: var(--white); margin-bottom: 10px;
    }
    .cart-empty p { font-size: .85rem; color: var(--smoke); margin-bottom: 28px; }
    .back-to-shop {
      display: inline-flex; align-items: center;
      font-family: var(--font-c); font-size: .75rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      background: var(--red); color: var(--white); padding: 12px 28px;
      clip-path: polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));
      transition: background .18s;
    }
    .back-to-shop:hover { background: var(--red-hot); }

    /* summary panel */
    .summary-panel {
      background: var(--off); border: 1px solid var(--border); padding: 28px;
      position: sticky; top: 82px;
    }
    .summary-title {
      font-family: var(--font-d); font-size: 1.5rem; letter-spacing: .06em;
      color: var(--white); margin-bottom: 20px;
    }
    .summary-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: .84rem; color: var(--smoke);
    }
    .summary-row:last-of-type { border-bottom: none; }
    .summary-row .val { color: var(--light); }
    .summary-total {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 18px 0 0; margin-top: 4px; border-top: 1px solid var(--border);
    }
    .summary-total-label {
      font-family: var(--font-c); font-size: .7rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: var(--smoke);
    }
    .summary-total-val {
      font-family: var(--font-d); font-size: 2rem; color: var(--white); letter-spacing: .04em;
    }
    .checkout-btn {
      width: 100%; padding: 15px; margin-top: 20px;
      font-family: var(--font-c); font-size: .82rem; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase;
      background: var(--red); color: var(--white);
      clip-path: polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
      transition: background .2s;
    }
    .checkout-btn:hover { background: var(--red-hot); }
    .checkout-btn:disabled { background: var(--border); color: var(--smoke); cursor: not-allowed; clip-path: none; }
    .summary-disclaimer {
      font-size: .64rem; color: var(--smoke); text-align: center;
      margin-top: 14px; line-height: 1.6; font-style: italic;
    }
    .continue-link {
      display: block; text-align: center; margin-top: 14px;
      font-family: var(--font-c); font-size: .68rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase; color: var(--smoke);
      text-decoration: underline; text-underline-offset: 3px; transition: color .18s;
    }
    .continue-link:hover { color: var(--light); }

    @media (max-width: 800px) {
      .cart-layout { grid-template-columns: 1fr; }
      .summary-panel { position: static; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <div id="nav-mount"></div>
  <div id="banner-mount"></div>

  <!-- CART HEADER -->
  <div class="cart-header">
    <div class="cart-header-graffiti" style="font-size:12rem;top:-40px;right:-20px;transform:rotate(-6deg)">CART</div>
    <div class="cart-header-inner container">
      <div class="cart-page-eyebrow">Your Cart</div>
      <div class="cart-page-title">Ready to <em>burn?</em></div>
    </div>
  </div>

  <!-- CART BODY -->
  <div class="cart-body">
    <div class="container">
      <div class="cart-layout" id="cart-layout"></div>
    </div>
  </div>

  <div id="footer-mount"></div>

  <!-- CHECKOUT MODAL -->
  <div class="modal-overlay" id="checkout-overlay" onclick="handleOverlayClick(event)">
    <div class="modal" id="checkout-modal"></div>
  </div>

  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/cart.js"></script>
  <script type="module">
    await initPage('cart');

    const THUMB_COLORS = ['#3a1a1a','#1a2a1a','#2a1a2a','#1a1a2a','#2a2a1a','#1a2a2a'];
    const THUMB_SHAPES = {
      1:  `<svg width="36" height="56" viewBox="0 0 70 110" fill="none"><path d="M35 10C25 10 18 25 18 50C18 78 25 100 35 102C45 100 52 78 52 50C52 25 45 10 35 10Z" fill="#CC1F1F" opacity=".8"/><path d="M35 10C34 4 37 1 39 3Z" fill="#555"/></svg>`,
      2:  `<svg width="44" height="44" viewBox="0 0 90 90" fill="none"><path d="M55 12C68 18 74 36 70 56C66 72 54 82 44 80C34 78 26 64 30 48C34 30 44 10 55 12Z" fill="#4a7a20" opacity=".8"/><path d="M55 12C53 5 57 1 60 4Z" fill="#555"/></svg>`,
      3:  `<svg width="36" height="56" viewBox="0 0 70 110" fill="none"><path d="M35 10C25 10 18 25 18 50C18 78 25 100 35 102C45 100 52 78 52 50C52 25 45 10 35 10Z" fill="#CC1F1F" opacity=".9"/><path d="M35 10C34 4 37 1 39 3Z" fill="#555"/></svg>`,
      4:  `<svg width="44" height="44" viewBox="0 0 90 90" fill="none"><ellipse cx="45" cy="52" rx="26" ry="30" fill="#c05010" opacity=".8"/><path d="M45 22C43 16 47 11 50 14Z" fill="#555"/></svg>`,
      5:  `<svg width="50" height="34" viewBox="0 0 100 70" fill="none"><path d="M20 52C22 38 32 22 50 14C64 8 76 10 78 18C80 26 68 34 54 36C38 40 28 50 26 62" fill="#c05010" opacity=".8"/></svg>`,
      6:  `<svg width="36" height="56" viewBox="0 0 70 110" fill="none"><path d="M35 10C25 10 18 25 18 50C18 78 25 100 35 102C45 100 52 78 52 50C52 25 45 10 35 10Z" fill="#CC1F1F" opacity=".85"/><path d="M35 10C34 4 37 1 39 3Z" fill="#555"/></svg>`,
      7:  `<svg width="44" height="44" viewBox="0 0 90 90" fill="none"><ellipse cx="45" cy="52" rx="26" ry="30" fill="#5A2A0A" opacity=".8"/><path d="M45 22C43 16 47 11 50 14Z" fill="#555"/></svg>`,
      8:  `<svg width="44" height="44" viewBox="0 0 90 90" fill="none"><path d="M55 12C68 18 74 36 70 56C66 72 54 82 44 80C34 78 26 64 30 48C34 30 44 10 55 12Z" fill="#4a7a20" opacity=".75"/><path d="M55 12C53 5 57 1 60 4Z" fill="#555"/></svg>`,
      9:  `<svg width="50" height="34" viewBox="0 0 100 70" fill="none"><path d="M20 52C22 38 32 22 50 14C64 8 76 10 78 18C80 26 68 34 54 36C38 40 28 50 26 62" fill="#c05010" opacity=".8"/></svg>`,
      10: `<svg width="48" height="44" viewBox="0 0 100 90" fill="none"><path d="M60 10C70 14 74 28 70 46C66 60 58 70 52 70Z" fill="#2a7a2a" opacity=".7"/><path d="M42 18C34 24 30 40 34 54C36 64 44 72 50 70Z" fill="#CC1F1F" opacity=".7"/><path d="M26 28C20 36 20 52 24 62Z" fill="#c07010" opacity=".6"/></svg>`,
      11: `<svg width="48" height="44" viewBox="0 0 100 90" fill="none"><path d="M60 10C70 14 74 28 70 46C66 60 58 70 52 70Z" fill="#2a7a2a" opacity=".7"/><path d="M42 18C34 24 30 40 34 54C36 64 44 72 50 70Z" fill="#CC1F1F" opacity=".9"/></svg>`,
      12: `<svg width="44" height="44" viewBox="0 0 90 90" fill="none"><ellipse cx="45" cy="52" rx="26" ry="30" fill="#8B3A1C" opacity=".75"/><path d="M45 22C43 16 47 11 50 14Z" fill="#555"/></svg>`,
    };

    window.renderCart = function() {
      const items = Cart.get();
      const layout = document.getElementById('cart-layout');
      Cart.updateBadge();

      if (!items.length) {
        layout.innerHTML = `
          <div class="cart-empty">
            <div class="cart-empty-icon">🌶</div>
            <h2>Your cart is empty.</h2>
            <p>Looks like you haven't added anything yet.</p>
            <a href="shop.html" class="back-to-shop">Back to Shop</a>
          </div>`;
        return;
      }

      const subtotal = items.reduce((s,i) => s + i.price * i.qty, 0);
      const shipping = subtotal >= 50 ? 0 : 6.99;
      const total    = subtotal + shipping;

      layout.innerHTML = `
        <div class="cart-items-col">
          <div class="cart-items-head">
            <span class="cart-items-label">${items.reduce((s,i)=>s+i.qty,0)} item${items.reduce((s,i)=>s+i.qty,0)!==1?'s':''}</span>
            <button class="clear-cart-btn" onclick="clearAll()">Clear all</button>
          </div>
          ${items.map(item => `
            <div class="cart-item" id="item-${item.id}">
              <div class="cart-item-thumb" style="background:${THUMB_COLORS[(item.id-1)%THUMB_COLORS.length]}">
                ${THUMB_SHAPES[item.id] || ''}
              </div>
              <div class="cart-item-info">
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-research">For research purposes only</div>
                <div class="cart-item-controls">
                  <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
                  <span class="qty-val">${item.qty}</span>
                  <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
                </div>
              </div>
              <div class="cart-item-right">
                <div class="cart-item-price">$${(item.price * item.qty).toFixed(2)}</div>
                <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
              </div>
            </div>`).join('')}
        </div>

        <div class="summary-panel">
          <div class="summary-title">Order Summary</div>
          <div class="summary-row"><span>Subtotal</span><span class="val">$${subtotal.toFixed(2)}</span></div>
          <div class="summary-row"><span>Shipping</span><span class="val">${shipping === 0 ? '<span style="color:#5BC75B">Free</span>' : '$' + shipping.toFixed(2)}</span></div>
          ${shipping > 0 ? `<div class="summary-row" style="font-size:.72rem"><span style="font-style:italic">Free shipping over $50</span><span></span></div>` : ''}
          <div class="summary-total">
            <span class="summary-total-label">Total</span>
            <span class="summary-total-val">$${total.toFixed(2)}</span>
          </div>
          <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout</button>
          <p class="summary-disclaimer">All products are for research purposes only and not intended for human consumption.</p>
          <a href="shop.html" class="continue-link">← Continue Shopping</a>
        </div>`;
    };

    window.changeQty = function(id, delta) {
      const items = Cart.get();
      const item = items.find(i => i.id === id);
      if (!item) return;
      const nextQty = Math.max(1, item.qty + delta);
      Cart.setQty(id, nextQty);
      renderCart();
    };

    window.removeItem = function(id) {
      Cart.remove(id);
      renderCart();
    };

    window.clearAll = function() {
      Cart.clear();
      renderCart();
    };

    window.handleOverlayClick = function(e) {
      if (e.target === e.currentTarget) closeCheckout();
    };

    renderCart();
  </script>
</body>
</html>
