<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — BigBoyPeps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── HEADER ──────────────────────────────────── */
    .dash-header {
      background: var(--off); border-bottom: 1px solid var(--border);
      padding: 48px 0 36px; position: relative; overflow: hidden;
    }
    .dash-graffiti {
      position: absolute; font-family: var(--font-m);
      color: var(--red); opacity: .04; pointer-events: none; user-select: none;
    }
    .dash-header-inner {
      position: relative; z-index: 1;
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .dash-greeting {
      font-family: var(--font-d); font-size: clamp(2rem,5vw,3.2rem);
      line-height: .95; letter-spacing: .03em; color: var(--white);
    }
    .dash-greeting em { color: var(--red); font-style: normal; }
    .dash-since {
      font-family: var(--font-c); font-size: .68rem; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase; color: var(--smoke); margin-top: 8px;
    }
    .member-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font-c); font-size: .62rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      background: rgba(204,31,31,.1); color: var(--red);
      border: 1px solid rgba(204,31,31,.2); padding: 5px 14px; border-radius: 999px;
    }

    /* ── BODY GRID ───────────────────────────────── */
    .dash-body { padding: 40px 0 80px; flex: 1; }
    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

    /* ── PANEL ───────────────────────────────────── */
    .panel { background: var(--off); border: 1px solid var(--border); }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 22px; border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-family: var(--font-c); font-size: .68rem; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase; color: var(--smoke);
    }
    .panel-action {
      font-family: var(--font-c); font-size: .66rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; color: var(--red);
      text-decoration: underline; text-underline-offset: 3px; transition: color .18s;
    }
    .panel-action:hover { color: var(--red-hot); }
    .panel-body { padding: 6px 0; }

    /* ── ORDER ROWS ──────────────────────────────── */
    .order-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 22px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .18s; text-decoration: none;
    }
    .order-row:last-child { border-bottom: none; }
    .order-row:hover { background: var(--card); }
    .order-thumb {
      width: 46px; height: 46px; flex-shrink: 0;
      background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .order-info { flex: 1; min-width: 0; }
    .order-name {
      font-family: var(--font-c); font-size: .85rem; font-weight: 700;
      letter-spacing: .03em; text-transform: uppercase; color: var(--white);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
    }
    .order-meta { font-size: .71rem; color: var(--smoke); }
    .order-meta span { color: var(--ash); margin-right: 8px; }
    .order-right { text-align: right; flex-shrink: 0; }
    .order-price { font-family: var(--font-d); font-size: 1.05rem; color: var(--white); letter-spacing: .04em; margin-bottom: 4px; }
    .order-status {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font-c); font-size: .58rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; padding: 3px 8px; border-radius: 999px;
    }
    .order-status::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .status-delivered  { background: rgba(34,100,34,.2);  color: #5BC75B; } .status-delivered::before  { background: #5BC75B; }
    .status-shipped    { background: rgba(30,80,180,.2);  color: #6E9EF5; } .status-shipped::before    { background: #6E9EF5; }
    .status-processing { background: rgba(200,140,0,.2);  color: #E8B84B; } .status-processing::before { background: #E8B84B; }
    .order-arrow { color: var(--smoke); margin-left: 6px; transition: transform .18s, color .18s; }
    .order-row:hover .order-arrow { transform: translateX(3px); color: var(--red); }

    .orders-empty {
      padding: 40px 22px; text-align: center;
      font-family: var(--font-c); font-size: .72rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase; color: var(--smoke);
    }
    .orders-empty a {
      display: inline-block; margin-top: 14px; color: var(--red);
      text-decoration: underline; text-underline-offset: 3px;
    }

    /* ── ACCOUNT ROWS ────────────────────────────── */
    .info-row {
      display: flex; align-items: center;
      padding: 13px 22px; border-bottom: 1px solid var(--border); gap: 12px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label {
      font-family: var(--font-c); font-size: .63rem; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase; color: var(--smoke);
      width: 105px; flex-shrink: 0;
    }
    .info-val { font-size: .87rem; color: var(--light); flex: 1; }
    .info-val.empty { color: var(--smoke); font-style: italic; }
    .info-val.locked { color: var(--ash); }
    .info-edit-btn {
      font-family: var(--font-c); font-size: .6rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; color: var(--smoke); flex-shrink: 0;
      text-decoration: underline; text-underline-offset: 3px; transition: color .18s;
    }
    .info-edit-btn:hover { color: var(--red); }
    .locked-icon { font-size: .7rem; color: var(--smoke); flex-shrink: 0; margin-left: 4px; opacity: .5; }

    /* inline editing */
    .info-edit-wrap { display: none; flex: 1; align-items: center; gap: 8px; }
    .info-edit-wrap.open { display: flex; }
    .info-edit-wrap.open ~ .info-val,
    .info-edit-wrap.open ~ .info-edit-btn { display: none; }
    .info-input {
      flex: 1; padding: 7px 11px;
      background: var(--card); color: var(--light);
      border: 1px solid var(--border); font-size: .87rem; outline: none;
      transition: border-color .18s;
    }
    .info-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(204,31,31,.1); }
    .info-save { font-family: var(--font-c); font-size: .63rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; background: var(--red); color: var(--white); padding: 7px 13px; transition: background .18s; flex-shrink: 0; }
    .info-save:hover { background: var(--red-hot); }
    .info-cancel { font-family: var(--font-c); font-size: .63rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--smoke); padding: 7px 6px; text-decoration: underline; text-underline-offset: 3px; transition: color .18s; flex-shrink: 0; }
    .info-cancel:hover { color: var(--light); }

    @media (max-width: 860px) { .dash-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="nav-mount"></div>
  <div id="banner-mount"></div>

  <div class="dash-header">
    <div class="dash-graffiti" style="font-size:11rem;top:-30px;right:-20px;transform:rotate(-7deg)">BBP</div>
    <div class="dash-header-inner container">
      <div>
        <div class="dash-greeting">Welcome back,<br/><em id="dash-name">—</em></div>
        <div class="dash-since" id="dash-since">Member since —</div>
      </div>
      <span class="member-badge">🌶 Active Member</span>
    </div>
  </div>

  <div class="dash-body">
    <div class="container">
      <div class="dash-grid">

        <div class="panel">
          <div class="panel-head">
            <span class="panel-title">Recent Purchases <span style="color:var(--border);font-weight:400;font-family:var(--font-b);text-transform:none;letter-spacing:0;font-size:.7rem">(last 5 unique products)</span></span>
            <a href="shop.html" class="panel-action">Shop Again →</a>
          </div>
          <div class="panel-body" id="orders-panel"></div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <span class="panel-title">Account Information</span>
          </div>
          <div class="panel-body" id="account-panel"></div>
        </div>

      </div>
    </div>
  </div>

  <div id="footer-mount"></div>

  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/cart.js"></script>
  <script type="module">
    /* ── Boot ── */
    await initPage('dashboard');

    const [profile, orders] = await Promise.all([
      Auth.getProfile(),
      Auth.getRecentOrders(),
    ]);

    /* ── Header ── */
    const firstName = profile?.first_name || '';
    const lastName  = profile?.last_name  || '';
    document.getElementById('dash-name').textContent =
      (firstName + (lastName ? ' ' + lastName : '') || 'Researcher') + '.';
    document.getElementById('dash-since').textContent =
      'Member since ' + Auth.formatDate(profile?.member_since);

    /* ── Thumb helpers ── */
    const THUMB_BG  = ['#3a1a1a','#1a2a1a','#2a1a2a','#1a1a2a','#2a2a1a','#1a2a2a'];
    const THUMB_COL = {1:'#CC1F1F',2:'#4a7a20',3:'#CC1F1F',4:'#c05010',5:'#c05010',
                       6:'#CC1F1F',7:'#5A2A0A',8:'#4a7a20',9:'#c05010',10:'#2a7a2a',
                       11:'#CC1F1F',12:'#8B3A1C'};

    function miniPepper(id) {
      const c = THUMB_COL[id] || '#CC1F1F';
      if (id===5||id===9)   return `<svg width="38" height="26" viewBox="0 0 100 70" fill="none"><path d="M20 52C22 38 32 22 50 14C64 8 76 10 78 18C80 26 68 34 54 36C38 40 28 50 26 62" fill="${c}" opacity=".85"/></svg>`;
      if (id===10||id===11) return `<svg width="36" height="32" viewBox="0 0 100 90" fill="none"><path d="M60 10C70 14 74 28 70 46C66 60 58 70 52 70Z" fill="#2a7a2a" opacity=".7"/><path d="M42 18C34 24 30 40 34 54C36 64 44 72 50 70Z" fill="${c}" opacity=".8"/></svg>`;
      if (id===2||id===8)   return `<svg width="34" height="34" viewBox="0 0 90 90" fill="none"><path d="M55 12C68 18 74 36 70 56C66 72 54 82 44 80C34 78 26 64 30 48C34 30 44 10 55 12Z" fill="${c}" opacity=".8"/></svg>`;
      if (id===4||id===7||id===12) return `<svg width="32" height="34" viewBox="0 0 90 90" fill="none"><ellipse cx="45" cy="52" rx="26" ry="30" fill="${c}" opacity=".8"/></svg>`;
      return `<svg width="22" height="36" viewBox="0 0 70 110" fill="none"><path d="M35 10C25 10 18 25 18 50C18 78 25 100 35 102C45 100 52 78 52 50C52 25 45 10 35 10Z" fill="${c}" opacity=".85"/></svg>`;
    }

    /* ── Orders panel ── */
    const ordersPanel = document.getElementById('orders-panel');
    if (!orders.length) {
      ordersPanel.innerHTML = `<div class="orders-empty">No orders yet.<br/><a href="shop.html">Start shopping →</a></div>`;
    } else {
      ordersPanel.innerHTML = orders.map(o => {
        const pid = o.product_id;
        const bg  = THUMB_BG[(pid - 1) % THUMB_BG.length];
        const date = new Date(o.ordered_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        return `
          <a class="order-row" href="shop.html" title="Find in shop">
            <div class="order-thumb" style="background:${bg}">${miniPepper(pid)}</div>
            <div class="order-info">
              <div class="order-name">${o.product_name}</div>
              <div class="order-meta"><span>${date}</span>Qty: ${o.qty}</div>
            </div>
            <div class="order-right">
              <div class="order-price">$${Number(o.total).toFixed(2)}</div>
              <span class="order-status status-${o.status}">${o.status}</span>
            </div>
            <span class="order-arrow">›</span>
          </a>`;
      }).join('');
    }

    /* ── Account panel ── */
    const FIELDS = [
      { key:'first_name', label:'First Name', type:'text',  placeholder:'Jane'            },
      { key:'last_name',  label:'Last Name',  type:'text',  placeholder:'Smith'           },
      { key:'phone',      label:'Phone',      type:'tel',   placeholder:'+1 555 000 0000' },
      { key:'address',    label:'Address',    type:'text',  placeholder:'123 Main St'     },
      { key:'city',       label:'City',       type:'text',  placeholder:'Austin'          },
      { key:'state',      label:'State',      type:'text',  placeholder:'TX'              },
    ];

    document.getElementById('account-panel').innerHTML =
      FIELDS.map(f => {
        const val = profile?.[f.key] || '';
        return `
          <div class="info-row">
            <div class="info-label">${f.label}</div>
            <div class="info-edit-wrap" id="wrap-${f.key}">
              <input class="info-input" id="input-${f.key}" type="${f.type}" value="${val}" placeholder="${f.placeholder}" />
              <button class="info-save"   onclick="saveField('${f.key}')">Save</button>
              <button class="info-cancel" onclick="cancelEdit('${f.key}')">Cancel</button>
            </div>
            <div class="info-val${val?'':' empty'}" id="val-${f.key}">${val || 'Not set'}</div>
            <button class="info-edit-btn" onclick="startEdit('${f.key}')">Edit</button>
          </div>`;
      }).join('') + `
      <div class="info-row">
        <div class="info-label">Email</div>
        <div class="info-val locked">${profile?.email || 'Not set'}</div>
        <span class="locked-icon" title="Managed by authentication">🔒</span>
      </div>
      <div class="info-row">
        <div class="info-label">Member Since</div>
        <div class="info-val locked">${Auth.formatDate(profile?.member_since)}</div>
        <span class="locked-icon" title="Cannot be changed">🔒</span>
      </div>`;

    /* ── Inline edit handlers — exposed to onclick ── */
    window.startEdit  = key => { document.getElementById('wrap-'+key).classList.add('open'); document.getElementById('input-'+key).focus(); };
    window.cancelEdit = key => { document.getElementById('wrap-'+key).classList.remove('open'); };
    window.saveField  = async key => {
      const val = document.getElementById('input-'+key).value.trim();
      await Auth.updateField(key, val);
      const el = document.getElementById('val-'+key);
      el.textContent = val || 'Not set';
      el.className   = 'info-val' + (val ? '' : ' empty');
      cancelEdit(key);
      /* refresh header if name changed */
      if (key === 'first_name' || key === 'last_name') {
        const p = await Auth.getProfile();
        document.getElementById('dash-name').textContent =
          ((p?.first_name||'') + (p?.last_name ? ' '+p.last_name : '') || 'Researcher') + '.';
      }
    };
  </script>
</body>
</html>
