<head>

  <link rel="stylesheet" href="css/shared.css?v=2" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    .shop-header {
      padding: 64px 0 48px; border-bottom: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .product-thumb {
      height: 220px; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; border-bottom: 1px solid var(--border);
      background: transparent;
    }
    .product-thumb::after { display: none; }

    .shop-header { padding: 64px 0 48px; border-bottom: 1px solid var(--border); }
    .shop-header-inner { position: relative; z-index: 1; }
    .shop-eyebrow {
      font-family: var(--font-c); font-size: .68rem; font-weight: 700;
      letter-spacing: .28em; text-transform: uppercase; color: var(--red);
      margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
    }
    .shop-eyebrow::before { content: ''; width: 28px; height: 2px; background: var(--red); }
    .shop-title {
      font-family: var(--font-d); font-size: clamp(3rem,7vw,6rem);
      line-height: .92; letter-spacing: .03em; color: #111111; margin-bottom: 16px;
    }
    .shop-title em { color: var(--red); font-style: normal; }
    .shop-desc { font-size: .9rem; color: #888888; max-width: 480px; line-height: 1.75; }

    .filters-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 28px 0; flex-wrap: wrap; border-bottom: 1px solid var(--border);
    }
    .filters-label {
      font-family: var(--font-c); font-size: .68rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: #888888; margin-right: 8px;
    }
    .filter-btn {
      padding: 7px 18px; font-family: var(--font-c); font-size: .7rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      color: #888888; border: 1px solid #E0E0E0; background: transparent; transition: all .18s;
    }
    .filter-btn:hover  { border-color: var(--ash); color: #222222; }
    .filter-btn.active { background: var(--red); color: #111111; border-color: var(--red); }
    .filter-btn-bundle { color: #D4A843; border-color: rgba(212,170,50,.4); letter-spacing: .14em; }
    .filter-btn-bundle:hover { border-color: #D4A843; color: #f5c842; background: rgba(212,170,50,.06); }
    .filter-btn-bundle.active { background: #D4A843; color: #04090F; border-color: #D4A843; }

    .products-section { padding: 48px 0 80px; flex: 1; }
    .products-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(256px, 1fr)); gap: 20px;
    }

    .product-card {
      background: #FFFFFF; border: 1px solid #E0E0E0;
      transition: border-color .22s, transform .22s, box-shadow .22s;
      display: flex; flex-direction: column;
    }
    .product-card:hover {
      border-color: var(--red); transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,.5);
    }

    .thumb-glow { position: absolute; inset: 0; background: rgba(184,137,42,.07); opacity: 0; transition: opacity .22s; z-index: 1; }
    .product-card:hover .thumb-glow { opacity: 1; }
    .product-badge {
      position: absolute; top: 12px; left: 12px; z-index: 2;
      font-family: var(--font-c); font-size: .6rem; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase;
      padding: 4px 10px; border: 1px solid #E0E0E0; background: rgba(12,12,12,.8); color: #888888;
    }
    .product-badge.badge-hot { background: rgba(184,137,42,.15); color: var(--red); border-color: rgba(184,137,42,.32); }

    .product-info { padding: 18px 20px 20px; display: flex; flex-direction: column; flex: 1; }
    .product-cat {
      font-family: var(--font-c); font-size: .62rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: var(--red); margin-bottom: 5px;
    }
    .product-name {
      font-family: var(--font-c); font-size: 1.05rem; font-weight: 700;
      letter-spacing: .04em; text-transform: uppercase; color: #111111; margin-bottom: 4px; line-height: 1.25;
    }
    .product-research { font-size: .67rem; color: #888888; font-style: italic; margin-bottom: 9px; }
    .product-desc { font-size: .8rem; color: #888888; line-height: 1.6; margin-bottom: 18px; flex: 1; }
    .product-footer { display: flex; flex-direction: column; gap: 10px; }
    .product-price-row { display: flex; align-items: center; justify-content: space-between; }
    .product-price { font-family: var(--font-d); font-size: 1.6rem; letter-spacing: .04em; color: #111111; }
    .add-btn {
      width: 100%; padding: 12px 16px;
      background: var(--red); color: #111111;
      font-family: var(--font-c); font-size: .74rem; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .18s;
      clip-path: polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));
    }
    .add-btn:hover { background: var(--red-hot); }
    .waitlist-btn {
      width: 100%; padding: 11px 16px;
      background: transparent; color: var(--red);
      font-family: var(--font-c); font-size: .72rem; font-weight: 700;
      letter-spacing: .16em; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      border: 1px solid rgba(184,137,42,.4); transition: all .18s;
    }
    .waitlist-btn:hover { background: rgba(184,137,42,.1); }

    .add-flash {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: #F6F6F6; border: 1px solid #E0E0E0; border-left: 3px solid var(--red);
      font-family: var(--font-c); font-size: .78rem; font-weight: 700; letter-spacing: .08em;
      color: #222222; padding: 12px 24px;
      opacity: 0; transition: all .26s; pointer-events: none; white-space: nowrap; z-index: 100;
    }
    .add-flash.show { opacity: 1; transform: translateX(-50%) translateY(0); }


    .product-card.out-of-stock { opacity: .45; cursor: pointer; }
    .product-card.out-of-stock .add-btn { display: none; }
    .product-card.out-of-stock:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,.5); border-color: var(--border); }

    /* ── Bundle cards ─────────────────────────────── */
    .bundle-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font-c); font-size: .58rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      background: rgba(212,170,50,.12); color: #D4A843;
      border: 1px solid rgba(212,170,50,.3); padding: 3px 9px; margin-bottom: 8px;
    }
    .bundle-qty-note {
      font-family: var(--font-c); font-size: .62rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: #888888;
      margin-bottom: 4px;
    }
    .bundle-unit-note {
      font-size: .72rem; color: #888888; margin-top: 3px;
    }
    .bundle-btn {
      width: 100%; padding: 12px 16px;
      background: #D4A843; color: #04090F;
      font-family: var(--font-c); font-size: .74rem; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .18s;
      clip-path: polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));
    }
    .bundle-btn:hover { background: #f5c842; }
    .bundle-unavail {
      width: 100%; padding: 11px 16px;
      background: transparent; color: #888888;
      font-family: var(--font-c); font-size: .7rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      border: 1px solid #E0E0E0; text-align: center;
    }
    .out-of-stock-banner {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(184,137,42,.92); color: #fff; z-index: 10;
      font-family: var(--font-c); font-size: .72rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase;
      padding: 8px 20px; white-space: nowrap; pointer-events: none;
    }
    .low-stock-label { font-family:var(--font-c);font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#D4A843;margin-bottom:8px; }
    .in-stock-label  { font-family:var(--font-c);font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#5BC75B;margin-bottom:8px; }
    @media (max-width: 700px) { .products-grid { grid-template-columns: 1fr 1fr; gap: 12px; } .nav-links { display: none; } }
    @media (max-width: 420px) { .products-grid { grid-template-columns: 1fr; } }


    /* skeleton loading */
    .skeleton-card { background: #FFFFFF; border: 1px solid #E0E0E0; }
    .skeleton-thumb { height: 200px; background: var(--charcoal, #222); }
    .skeleton-info  { padding: 18px 20px 20px; }
    .skeleton-line  { border-radius: 2px; background: var(--charcoal, #222); }
    .skeleton-pulse { animation: skeletonPulse 1.4s ease-in-out infinite; }
    @keyframes skeletonPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }
  </style>
</head>
<body>
  <div id="nav-mount"></div>
  <div id="banner-mount"></div>

  <div class="shop-header">
    <div class="shop-header-inner container">
      <div class="shop-eyebrow">All Products</div>
      <div class="shop-title">The Research <em>Catalog</em></div>
      <p class="shop-desc">Premium research peptides and compounds. For research purposes only — not for human consumption.</p>
    </div>
  </div>

  <div class="container">
    <div class="filters-bar" id="filters">
      <span class="filters-label">Filter</span>
      <button class="filter-btn active" data-cat="All">All</button>
      <button class="filter-btn" data-cat="In Stock">In Stock</button>
      <button class="filter-btn" data-cat="GLP Peptides">GLP Peptides</button>
      <button class="filter-btn" data-cat="GH Peptides">GH Peptides</button>
      <button class="filter-btn" data-cat="Peptides">Peptides</button>
      <button class="filter-btn" data-cat="Bundles">◈ Bundles</button>
    </div>
  </div>

  <div class="products-section">
    <div class="container">
      <div class="products-grid" id="products-grid">
        <!-- skeleton cards shown while products load -->
        ${Array.from({length:6}).map(()=>`
          <div class="skeleton-card">
            <div class="skeleton-thumb skeleton-pulse"></div>
            <div class="skeleton-info">
              <div class="skeleton-line skeleton-pulse" style="width:40%;height:.55rem;margin-bottom:10px"></div>
              <div class="skeleton-line skeleton-pulse" style="width:80%;height:.8rem;margin-bottom:8px"></div>
              <div class="skeleton-line skeleton-pulse" style="width:95%;height:.7rem;margin-bottom:6px"></div>
              <div class="skeleton-line skeleton-pulse" style="width:70%;height:.7rem"></div>
            </div>
          </div>`).join('')}
      </div>
    </div>
  </div>

  <div id="footer-mount"></div>
  <div class="add-flash" id="add-flash"></div>

<script type="module">
    import { supabase } from './js/supabase.js';
    import './js/auth.js?v=15';
    import './js/cart.js?v=19';
    import { loadProducts, allProducts, getProduct, pepperSVG, heatPips } from './js/products.js?v=15';

    await Promise.all([
      window.initPage('shop'),
      loadProducts()
    ]);

    function thumbHTML(p) {
      if (p.images) {
        return '<img src="pdct img/' + p.images + '" alt="' + p.name + '" style="width:auto;height:160px;object-fit:contain;object-position:center;position:relative;z-index:1;display:block;margin:auto" />';
      }
      return pepperSVG(p);
    }

    function thumbBg(p) {
      return 'transparent';
    }

    function buildBundleCard(p) {
      var bundlePrice = p.bundle_price;
      var unitNote    = '$' + (bundlePrice / 10).toFixed(2) + ' per vial';
      return '<div class="product-card" onclick="event.stopPropagation()" style="cursor:pointer">'
        + '<div class="product-thumb" style="background:' + thumbBg(p) + '">'
        + '<div class="thumb-glow"></div>'
        + thumbHTML(p)
        + '</div>'
        + '<div class="product-info">'
        + '<div class="bundle-badge">◈ Bundle of 10</div>'
        + '<div class="product-name">' + p.name + '</div>'
        + '<div class="product-desc">' + p.description + '</div>'
        + '<div class="bundle-qty-note">' + p.inventory + ' units available</div>'
        + '<div class="product-footer">'
        + '<div class="product-price-row"><div class="product-price">$' + Number(bundlePrice).toFixed(2) + '</div></div>'
        + '<div class="bundle-unit-note">' + unitNote + ' · 10 vials</div>'
        + '<button class="bundle-btn" onclick="event.stopPropagation();addBundleToCart(' + p.id + ')">+ Add Bundle to Cart</button>'
        + '</div>'
        + '</div>'
        + '</div>';
    }

    function buildCard(p) {
      var badge = p.badge ? '<span class="product-badge' + (p.badge.includes('\uD83D\uDD25') ? ' badge-hot' : '') + '">' + p.badge + '</span>' : '';
      return (p.inventory <= 0
          ? '<div class="product-card out-of-stock" onclick="goToProduct(' + p.id + ')" style="cursor:pointer">'
          : '<div class="product-card" onclick="goToProduct(' + p.id + ')" style="cursor:pointer">')
        + '<div class="product-thumb" style="background:' + thumbBg(p) + '">'
        + '<div class="thumb-glow"></div>'
        + badge
        + thumbHTML(p)
        + (p.inventory <= 0 ? '<div class="out-of-stock-banner">Out of Stock</div>' : '')
        + '</div>'
        + '<div class="product-info">'
        + '<div class="product-cat">' + p.category + '</div>'
        + '<div class="product-name">' + p.name + '</div>'

        + '<div class="product-desc">' + p.description + '</div>'
        + (p.inventory <= 0
          ? ''
          : p.inventory <= 10
          ? '<div class="low-stock-label">Low Stock — ' + p.inventory + ' left</div>'
          : '<div class="in-stock-label">In Stock</div>')
        + '<div class="product-footer">'
        + '<div class="product-price-row"><div class="product-price">$' + Number(p.price).toFixed(2) + '</div></div>'
        + (p.inventory <= 0
          ? '<button class="waitlist-btn" onclick="event.stopPropagation();joinWaitlistShop(' + p.id + ',\'' + p.name + '\')" title="Notify me when in stock">🔔 Notify When Available</button>'
          : '<button class="add-btn" onclick="event.stopPropagation();addToCart(' + p.id + ')" title="Add to cart">+ Add to Cart</button>')
        + '</div>'
        + '</div>'
        + '</div>';
    }

    function sortProducts(list) {
      // In-stock sorted by ID asc, then OOS sorted by ID asc at the bottom
      var inStock = list.filter(function(p) { return p.inventory > 0; }).sort(function(a,b) { return a.id - b.id; });
      var oos     = list.filter(function(p) { return p.inventory <= 0; }).sort(function(a,b) { return a.id - b.id; });
      return inStock.concat(oos);
    }

    function renderProducts(cat) {
      var all  = allProducts();
      var grid = document.getElementById('products-grid');
      var list, html;

      if (cat === 'Bundles') {
        // Show only products that have a bundle_price set
        list = all.filter(function(p) { return p.bundle_price != null && p.inventory >= 10; })
                  .sort(function(a,b) { return a.id - b.id; });
        html = list.length
          ? list.map(buildBundleCard).join('')
          : '<div style="grid-column:1/-1;padding:48px 0;text-align:center"><p style="font-family:var(--font-c);font-size:.75rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#888888">No bundles available</p></div>';
      } else {
        if (cat === 'In Stock') {
          list = all.filter(function(p) { return p.inventory > 0; }).sort(function(a,b) { return a.id - b.id; });
        } else {
          list = cat === 'All' ? sortProducts(all) : sortProducts(all.filter(function(p) { return p.category === cat; }));
        }
        html = list.length
          ? list.map(buildCard).join('')
          : '<div style="grid-column:1/-1;padding:48px 0;text-align:center"><p style="font-family:var(--font-c);font-size:.75rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#888888">' + (all.length === 0 ? 'No products loaded — check browser console (F12) for errors' : 'No products in this category') + '</p></div>';
      }
      grid.innerHTML = html;
    }

    window.joinWaitlistShop = async function(id, name) {
      const result = await Auth.joinWaitlist(id, name);
      const f = document.getElementById('add-flash');
      if (result.ok) {
        f.textContent = '🔔 Added to waitlist — we\'ll email you when ' + name + ' is back';
        f.style.borderLeftColor = '#5BC75B';
      } else if (result.err === 'already_on_waitlist') {
        f.textContent = 'You\'re already on the waitlist for ' + name;
        f.style.borderLeftColor = 'var(--smoke)';
      } else {
        f.textContent = 'Could not join waitlist — please try again';
        f.style.borderLeftColor = '#D4A843';
      }
      f.classList.add('show');
      clearTimeout(f._t);
      f._t = setTimeout(function() { f.classList.remove('show'); }, 3000);
    };

    window.goToProduct = function(id) {
      window.location.href = 'product.html?id=' + id;
    };

    window.addBundleToCart = function(id) {
      var p = getProduct(id);
      if (!p || !p.bundle_price) return;
      if (p.inventory < 10) {
        var f = document.getElementById('add-flash');
        f.textContent = 'Not enough stock for a bundle of ' + p.name;
        f.style.borderLeftColor = '#D4A843';
        f.classList.add('show');
        clearTimeout(f._t);
        f._t = setTimeout(function() { f.classList.remove('show'); }, 2500);
        return;
      }
      // Add as bundle: price = bundle_price, qty = 1, isBundle = true, bundleQty = 10
      Cart.addBundle({ id: p.id, name: p.name, price: p.bundle_price, bundleQty: 10 });
      var f = document.getElementById('add-flash');
      f.textContent = p.name + ' bundle added to cart';
      f.style.borderLeftColor = '#D4A843';
      f.classList.add('show');
      clearTimeout(f._t);
      f._t = setTimeout(function() { f.classList.remove('show'); }, 2200);
    };

    window.addToCart = function(id) {
      var p = getProduct(id);
      if (!p) return;
      var result = Cart.add(p);
      var f = document.getElementById('add-flash');
      if (!result.ok) {
        f.textContent = result.err === 'out_of_stock'
          ? p.name + ' is out of stock'
          : 'Only ' + result.available + ' left in stock';
        f.style.borderLeftColor = '#D4A843';
      } else {
        f.textContent = p.name + ' added to cart';
        f.style.borderLeftColor = 'var(--red)';
      }
      f.classList.add('show');
      clearTimeout(f._t);
      f._t = setTimeout(function() { f.classList.remove('show'); }, 2200);
    };

    document.getElementById('filters').addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderProducts(btn.dataset.cat);
    });

    renderProducts('All');

    // Style the Bundles tab amber only if at least one bundle is available
    var hasBundles = allProducts().some(function(p) { return p.bundle_price != null && p.inventory >= 10; });
    var bundleTab  = document.querySelector('.filter-btn[data-cat="Bundles"]');
    if (bundleTab) {
      if (hasBundles) {
        bundleTab.classList.add('filter-btn-bundle');
      } else {
        bundleTab.classList.remove('filter-btn-bundle');
      }
    }
  </script>

</body>
</html>
