<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — BigBoyPeps</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/shared.css" />

  <style>
    body { display:flex; flex-direction:column; min-height:100vh; }

    .breadcrumb {
      padding:18px 0;
      border-bottom:1px solid var(--border);
      font-family:var(--font-c);
      font-size:.65rem;
      font-weight:600;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--smoke);
      display:flex;
      gap:8px;
    }

    .product-page { flex:1; padding:52px 0 80px; }

    .product-layout {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:64px;
    }

    .product-main-thumb {
      width:100%;
      aspect-ratio:1/1;
      border:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }

    .product-oos-overlay {
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.45);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:5;
    }

    .product-oos-banner {
      background:rgba(204,31,31,.92);
      color:#fff;
      font-family:var(--font-c);
      font-size:.8rem;
      font-weight:700;
      letter-spacing:.22em;
      text-transform:uppercase;
      padding:10px 28px;
    }

    .product-title {
      font-family:var(--font-d);
      font-size:clamp(2.2rem,4vw,3.4rem);
      color:#fff;
      margin-bottom:16px;
    }

    .product-price {
      font-family:var(--font-d);
      font-size:3rem;
      color:#fff;
      margin-bottom:20px;
    }

    .qty-control {
      display:flex;
      border:1px solid var(--border);
    }

    .qty-control button {
      width:40px;
      height:48px;
      background:var(--card);
      color:#fff;
      cursor:pointer;
    }

    .qty-display {
      width:50px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--off);
      color:#fff;
      border-left:1px solid var(--border);
      border-right:1px solid var(--border);
    }

    .add-to-cart-btn {
      height:48px;
      padding:0 18px;
      margin-left:12px;
      font-family:var(--font-c);
      font-weight:700;
      text-transform:uppercase;
      cursor:pointer;
      background:var(--red);
      color:#fff;
    }

    .add-to-cart-btn.added {
      background:#2a6a2a;
    }

    .product-details {
      margin-top:28px;
    }

    .detail-row {
      display:flex;
      padding:10px 0;
      border-bottom:1px solid var(--border);
    }

    .detail-key {
      width:130px;
      font-family:var(--font-c);
      font-size:.65rem;
      font-weight:700;
      text-transform:uppercase;
      color:var(--smoke);
    }

    .detail-val {
      color:var(--light);
      font-size:.9rem;
    }

    .product-description {
      margin-top:18px;
      padding-left:16px;
      border-left:2px solid var(--border);
      color:var(--ash);
      line-height:1.7;
    }

    @media (max-width:860px) {
      .product-layout { grid-template-columns:1fr; }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="breadcrumb">
    <a href="shop.html">Shop</a>
    <span>›</span>
    <span id="breadcrumb-name">Loading…</span>
  </div>
</div>

<div class="product-page">
  <div class="container">
    <div id="product-content">Loading...</div>
  </div>
</div>

<script type="module">
import './js/auth.js';
import './js/cart.js';
import { loadProducts, getProduct, pepperSVG } from './js/products.js';

await loadProducts();

const id = parseInt(new URLSearchParams(location.search).get('id'));
const p = getProduct(id);

const el = document.getElementById('product-content');

if (!p) {
  el.innerHTML = `<p>Product not found</p>`;
} else {
  document.getElementById('breadcrumb-name').textContent = p.name;

  el.innerHTML = `
  <div class="product-layout">

    <div class="product-main-thumb">

      ${p.inventory <= 0 ? `
        <div class="product-oos-overlay">
          <div class="product-oos-banner">Out of Stock</div>
        </div>` : ''}

      ${p.images
        ? `<img src="pdct img/${p.images}" style="height:75%;object-fit:contain">`
        : pepperSVG(p)
      }

    </div>

    <div>

      <div class="product-title">${p.name}</div>
      <div class="product-price">$${Number(p.price).toFixed(2)}</div>

      <div style="display:flex;align-items:center;margin-bottom:16px">

        <div class="qty-control">
          <button onclick="changeQty(-1)">−</button>
          <div class="qty-display" id="qty">1</div>
          <button onclick="changeQty(1)">+</button>
        </div>

        ${
          p.inventory <= 0
          ? `
            <button class="add-to-cart-btn"
              onclick="joinWaitlist(${p.id}, '${p.name.replace(/'/g, "\\'")}')"
              style="background:var(--border);color:var(--red)">
              🔔 Notify Me
            </button>
          `
          : `
            <button class="add-to-cart-btn" onclick="addToCart(${p.id})">
              Add to Cart
            </button>
          `
        }

      </div>

      <div class="product-description">${p.description}</div>

      <!-- ✅ RESTORED DETAILS -->
      <div class="product-details">

        <div class="detail-row">
          <div class="detail-key">Category</div>
          <div class="detail-val">${p.category}</div>
        </div>

        <div class="detail-row">
          <div class="detail-key">Use</div>
          <div class="detail-val">Research purposes only</div>
        </div>

        <div class="detail-row">
          <div class="detail-key">Consumption</div>
          <div class="detail-val">Not for human consumption</div>
        </div>

        <div class="detail-row">
          <div class="detail-key">Status</div>
          <div class="detail-val">
            ${p.inventory <= 0 ? 'Out of Stock' : 'In Stock'}
          </div>
        </div>

      </div>

    </div>
  </div>`;
}

/* ── qty ── */
let qty = 1;

window.changeQty = function(v) {
  const p = getProduct(id);
  const max = p?.inventory || 1;

  qty = Math.max(1, Math.min(max, qty + v));
  document.getElementById('qty').textContent = qty;
};

/* ── HARD BLOCK CART ── */
window.addToCart = function(productId) {
  const p = getProduct(productId);

  if (!p || p.inventory <= 0) return; // 🔒 HARD STOP

  for (let i = 0; i < qty; i++) Cart.add(p);

  const btn = document.querySelector('.add-to-cart-btn');
  if (!btn) return;

  btn.textContent = 'Added ✓';
  btn.classList.add('added');

  setTimeout(() => {
    btn.textContent = 'Add to Cart';
    btn.classList.remove('added');
  }, 1200);
};

/* ── WAITLIST ── */
window.joinWaitlist = async function(productId, productName) {
  const res = await Auth.joinWaitlist(productId, productName);

  const btn = document.querySelector('.add-to-cart-btn');

  if (res.ok) {
    btn.textContent = "You're on the waitlist ✓";
  } else if (res.err === 'already_on_waitlist') {
    btn.textContent = "Already on waitlist";
  } else {
    btn.textContent = "Try again";
  }
};

</script>

</body>
</html>
