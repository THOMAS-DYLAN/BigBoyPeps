<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — BigBoyPeps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── BREADCRUMB ───────────────────────────────── */
    .breadcrumb {
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-c); font-size: .65rem; font-weight: 600;
      letter-spacing: .14em; text-transform: uppercase; color: var(--smoke);
      display: flex; align-items: center; gap: 8px;
    }
    .breadcrumb a { color: var(--smoke); transition: color .18s; }
    .breadcrumb a:hover { color: var(--red); }
    .breadcrumb-sep { opacity: .4; }

    /* ── PRODUCT LAYOUT ──────────────────────────── */
    .product-page { flex: 1; padding: 52px 0 80px; }
    .product-layout {
      display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start;
    }

    /* ── VISUAL PANEL ────────────────────────────── */
    .product-visual { position: sticky; top: 82px; }
    .product-main-thumb {
      width: 100%; aspect-ratio: 1 / 1;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); position: relative; overflow: hidden;
    }
    .product-main-thumb::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(12,12,12,.5) 100%);
    }
    .product-svg-wrap {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
    }
    .product-svg-wrap svg { transform: scale(2.2); }
    .product-svg-wrap img {
      height: 75%; width: auto;
      object-fit: contain; object-position: center;
      display: block; margin: auto;
    }

    /* badge on visual */
    .product-visual-badge {
      position: absolute; top: 16px; left: 16px; z-index: 2;
      font-family: var(--font-c); font-size: .65rem; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase;
      padding: 5px 14px; border: 1px solid rgba(204,31,31,.4);
      background: rgba(204,31,31,.15); color: var(--red);
    }

    /* research tag */
    .product-research-tag {
      margin-top: 16px; padding: 12px 16px;
      border: 1px solid var(--border); background: var(--off);
      font-size: .7rem; color: var(--smoke); font-style: italic;
      line-height: 1.6; text-align: center;
    }

    /* ── INFO PANEL ──────────────────────────────── */
    .product-info-panel { padding-top: 4px; }

    .product-cat-tag {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-c); font-size: .65rem; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase; color: var(--red);
      margin-bottom: 14px;
    }
    .product-cat-tag::before { content: ''; width: 20px; height: 2px; background: var(--red); }

    .product-title {
      font-family: var(--font-d); font-size: clamp(2.2rem, 4vw, 3.4rem);
      letter-spacing: .04em; line-height: .95; color: var(--white); margin-bottom: 20px;
    }

    .product-info-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    }
    .product-info-label {
      font-family: var(--font-c); font-size: .65rem; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase; color: var(--smoke);
    }
    .pip { width: 10px; height: 10px; background: var(--border); }
    .pip.on { background: var(--red); }

    .product-description {
      font-size: .95rem; color: var(--ash); line-height: 1.8; margin-bottom: 32px;
      border-left: 2px solid var(--border); padding-left: 20px;
    }

    .product-divider { height: 1px; background: var(--border); margin: 28px 0; }

    .product-price-row {
      display: flex; align-items: baseline; gap: 16px; margin-bottom: 28px;
    }
    .product-price-big {
      font-family: var(--font-d); font-size: 3rem; letter-spacing: .04em; color: var(--white);
    }
    .product-price-note {
      font-size: .75rem; color: var(--smoke); font-style: italic;
    }

    /* qty + CTA row */
    .product-actions { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .qty-control {
      display: flex; align-items: center; gap: 0;
      border: 1px solid var(--border);
    }
    .qty-dec, .qty-inc {
      width: 38px; height: 48px; display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: var(--ash); transition: all .18s; background: var(--card);
    }
    .qty-dec:hover, .qty-inc:hover { color: var(--white); background: var(--charcoal, #2a2a2a); }
    .qty-display {
      width: 52px; height: 48px; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-d); font-size: 1.2rem; letter-spacing: .04em;
      color: var(--white); background: var(--off); border-left: 1px solid var(--border); border-right: 1px solid var(--border);
      user-select: none;
    }
    .add-to-cart-btn {
      flex: 1; min-width: 180px; height: 48px;
      font-family: var(--font-c); font-size: .8rem; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase;
      background: var(--red); color: var(--white);
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
      transition: background .2s, transform .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .add-to-cart-btn:hover { background: var(--red-hot); transform: translateY(-1px); }
    .add-to-cart-btn.added { background: #2a6a2a; clip-path: none; }

    /* details list */
    .product-details { margin-top: 32px; }
    .detail-row {
      display: flex; padding: 12px 0; border-bottom: 1px solid var(--border);
      font-size: .85rem;
    }
    .detail-row:first-child { border-top: 1px solid var(--border); }
    .detail-key {
      font-family: var(--font-c); font-size: .65rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase; color: var(--smoke);
      width: 120px; flex-shrink: 0; padding-top: 2px;
    }
    .detail-val { color: var(--light); }

    /* related products strip — horizontal scroll row */
    .related-section { padding: 48px 0; border-top: 1px solid var(--border); }
    .related-title {
      font-family: var(--font-d); font-size: 1.8rem; letter-spacing: .04em;
      color: var(--white); margin-bottom: 24px;
    }
    .related-title em { color: var(--red); font-style: normal; }
    .related-row {
      display: flex; gap: 16px;
      overflow-x: auto; padding-bottom: 12px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .related-row::-webkit-scrollbar { height: 4px; }
    .related-row::-webkit-scrollbar-track { background: transparent; }
    .related-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .related-card {
      background: var(--card); border: 1px solid var(--border);
      cursor: pointer; transition: border-color .2s, transform .2s;
      display: flex; flex-direction: column;
      flex: 0 0 200px; /* fixed width, never shrinks */
    }
    .related-card:hover { border-color: var(--red); transform: translateY(-3px); }
    .related-thumb {
      height: 130px; display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid var(--border); position: relative; overflow: hidden;
    }
    .related-thumb::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(12,12,12,.5) 100%);
    }
    .related-info { padding: 14px 16px; }
    .related-name {
      font-family: var(--font-c); font-size: .85rem; font-weight: 700;
      letter-spacing: .04em; text-transform: uppercase; color: var(--white);
      margin-bottom: 4px; line-height: 1.2;
    }
    .related-price {
      font-family: var(--font-d); font-size: 1.1rem; color: var(--white); letter-spacing: .04em;
    }

    /* toast */
    .add-toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--off); border: 1px solid var(--border); border-left: 3px solid var(--red);
      font-family: var(--font-c); font-size: .78rem; font-weight: 700; letter-spacing: .08em;
      color: var(--light); padding: 13px 26px;
      opacity: 0; transition: all .26s; pointer-events: none; white-space: nowrap; z-index: 100;
    }
    .add-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── REVIEWS ─────────────────────────────────── */
    .reviews-area {
      padding: 64px 0;
      border-top: 1px solid var(--border);
    }
    .reviews-header-row {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: 16px; margin-bottom: 32px;
    }
    .reviews-title {
      font-family: var(--font-d); font-size: 1.8rem; letter-spacing: .04em; color: var(--white);
    }
    .reviews-summary {
      display: flex; align-items: center; gap: 12px;
    }
    .review-avg {
      font-family: var(--font-d); font-size: 2.4rem; letter-spacing: .04em; color: var(--white);
    }
    .review-stars-display { display: flex; gap: 3px; }
    .star {
      width: 18px; height: 18px; position: relative;
    }
    .star svg { width: 18px; height: 18px; }
    .review-count {
      font-family: var(--font-c); font-size: .7rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase; color: var(--smoke);
    }

    /* your rating */
    .your-rating-panel {
      background: var(--off); border: 1px solid var(--border);
      padding: 22px 24px; margin-bottom: 32px;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    .your-rating-label {
      font-family: var(--font-c); font-size: .68rem; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase; color: var(--smoke);
      flex-shrink: 0;
    }
    .star-picker { display: flex; gap: 6px; }
    .star-btn {
      width: 32px; height: 32px; background: none; border: none;
      cursor: pointer; padding: 0; transition: transform .15s;
    }
    .star-btn:hover { transform: scale(1.15); }
    .star-btn svg { width: 28px; height: 28px; display: block; }
    .rating-saved {
      font-family: var(--font-c); font-size: .68rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      color: #5BC75B; display: none;
    }
    .rating-saved.show { display: block; }
    .review-card { background:var(--off);border:1px solid var(--border);padding:16px 20px;margin-bottom:10px; }
    .review-card-header { display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap; }
    .review-card-username { font-family:var(--font-c);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--white); }
    .review-card-stars { display:flex;gap:2px; }
    .review-card-stars svg { width:13px;height:13px; }
    .review-card-date { font-size:.68rem;color:var(--smoke);margin-left:auto; }
    .review-card-comment { font-size:.85rem;color:var(--light);line-height:1.65; }
    .review-card-actions { display:flex;gap:10px;margin-top:10px; }
    .review-action-btn { font-family:var(--font-c);font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:none;color:var(--smoke);padding:4px 10px;border:1px solid var(--border);cursor:pointer;transition:all .18s; }
    .review-action-btn:hover { color:var(--light);border-color:var(--ash); }
    .review-action-btn.del:hover { color:#FF3030;border-color:#FF3030; }

    /* ── loading / error ─────────────────────────── */
    .loading-state, .error-state {
      text-align: center; padding: 80px 0;
    }
    .loading-state p, .error-state p {
      font-family: var(--font-c); font-size: .8rem; font-weight: 700;
      letter-spacing: .16em; text-transform: uppercase; color: var(--smoke);
    }
    .error-state a {
      display: inline-block; margin-top: 20px; color: var(--red);
      text-decoration: underline; text-underline-offset: 3px;
      font-family: var(--font-c); font-size: .72rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
    }


    .product-oos-overlay {
      position: absolute; inset: 0; z-index: 5;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.45);
    }
    .product-oos-banner {
      background: rgba(204,31,31,.92); color: #fff;
      font-family: var(--font-c); font-size: .8rem; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase;
      padding: 10px 28px;
    }
    @media (max-width: 860px) {
      .product-layout { grid-template-columns: 1fr; gap: 36px; }
      .product-visual { position: static; }
      .product-main-thumb { aspect-ratio: 4/3; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <div id="nav-mount"></div>
  <div id="banner-mount"></div>

  <!-- BREADCRUMB -->
  <div class="container">
    <div class="breadcrumb">
      <a href="shop.html">Shop</a>
      <span class="breadcrumb-sep">›</span>
      <span id="breadcrumb-name">Loading…</span>
    </div>
  </div>

  <!-- PRODUCT PAGE -->
  <div class="product-page">
    <div class="container">
      <div id="product-content">
        <div class="loading-state"><p>Loading product…</p></div>
      </div>
    </div>
  </div>

  <!-- RATING SECTION — stars only, no text comments -->
  <div class="container" id="reviews-section">
    <div class="reviews-area">
      <div class="reviews-header-row">
        <div class="reviews-summary" id="reviews-summary"></div>
      </div>
      <div class="your-rating-panel" id="your-rating-panel"></div>

      <!-- WRITE / EDIT REVIEW -->
      <div id="review-form-wrap" style="margin-top:16px;display:none;background:var(--off);border:1px solid var(--border);padding:20px">
        <div style="font-family:var(--font-c);font-size:.63rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--smoke);margin-bottom:12px">Write a Review</div>
        <!-- Star picker inside form -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <span style="font-family:var(--font-c);font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--smoke)">Your Rating</span>
          <div id="form-star-picker" style="display:flex;gap:4px">
            ${[1,2,3,4,5].map(n => `<button style="background:none;padding:0;cursor:pointer;display:inline-flex;transition:transform .12s" onmouseenter="hoverFormStars(n)" onmouseleave="resetFormStars()" onclick="pickFormStar($n});event.preventDefault()"><svg viewBox="0 0 24 24" fill="var(--border)" width="22" height="22" id="fstar-${n}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></button>`).join('')}
          </div>
          <span id="form-star-label" style="font-family:var(--font-c);font-size:.6rem;color:var(--smoke)"></span>
        </div>
        <input id="review-username" type="text" placeholder="Display name (e.g. ResearcherJane)" maxlength="40"
          style="width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border);color:var(--light);font-size:.87rem;outline:none;box-sizing:border-box;margin-bottom:8px;transition:border-color .2s"
          onfocus="this.style.borderColor='var(--red)'" onblur="this.style.borderColor='var(--border)'"/>
        <textarea id="review-comment" placeholder="Share your experience with this compound..." maxlength="500" rows="3"
          style="width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border);color:var(--light);font-size:.87rem;outline:none;box-sizing:border-box;resize:vertical;font-family:inherit;transition:border-color .2s"
          onfocus="this.style.borderColor='var(--red)'" onblur="this.style.borderColor='var(--border)'"></textarea>
        <div style="display:flex;gap:10px;margin-top:10px;align-items:center">
          <button onclick="submitReviewWithComment()" style="font-family:var(--font-c);font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:var(--red);color:#fff;padding:9px 20px;border:none;cursor:pointer;transition:background .18s" onmouseover="this.style.background='var(--red-hot)'" onmouseout="this.style.background='var(--red)'">Post Review</button>
          <button onclick="document.getElementById('review-form-wrap').style.display='none'" style="font-family:var(--font-c);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:none;color:var(--smoke);padding:9px 14px;border:1px solid var(--border);cursor:pointer">Cancel</button>
          <span id="review-err" style="font-size:.72rem;color:#FF3030"></span>
        </div>
      </div>

      <!-- REVIEWS LIST -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:28px;margin-bottom:12px" id="reviews-list-header" style="display:none">
        <div style="font-family:var(--font-c);font-size:.63rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--smoke)">Community Reviews</div>
        <select id="reviews-sort" onchange="sortAndRenderList()" style="background:var(--card);color:var(--light);border:1px solid var(--border);padding:5px 10px;font-size:.75rem;outline:none;cursor:pointer">
          <option value="desc">Highest Rated</option>
          <option value="asc">Lowest Rated</option>
        </select>
      </div>
      <div id="reviews-list"></div>
    </div>
  </div>

  <!-- RELATED PRODUCTS -->
  <div class="container" id="related-section" style="display:none">
    <div class="related-section">
      <div class="related-title">More <em>Heat</em></div>
      <div class="related-row" id="related-grid"></div>
    </div>
  </div>

  <div id="footer-mount"></div>
  <div class="add-toast" id="add-toast"></div>

  <script type="module">
    import './js/auth.js?v=14';
    import './js/cart.js?v=14';
    import { loadProducts, allProducts, getProduct, pepperSVG, miniPepperSVG, heatPips } from './js/products.js?v=10';

    await Promise.all([window.initPage('shop'), loadProducts()]);

    /* ── Read ?id= from URL ── */
    const params = new URLSearchParams(window.location.search);
    const productId = parseInt(params.get('id'), 10);

    const content = document.getElementById('product-content');

    if (!productId || isNaN(productId)) {
      content.innerHTML = `<div class="error-state"><p>No product specified.</p><a href="shop.html">← Back to Shop</a></div>`;
    } else {
      const p = getProduct(productId);
      if (!p) {
        content.innerHTML = `<div class="error-state"><p>Product not found.</p><a href="shop.html">← Back to Shop</a></div>`;
      } else {
        const rating = await Auth.getProductRating(productId);
        renderProduct(p, rating);
        renderRelated(p);
        renderReviews(productId, rating);
      }
    }

    /* ── Render full product ── */
    function renderProduct(p, rating = { average: 0, count: 0, userStars: 0 }) {
      document.title = `${p.name} — BigBoyPeps`;
      document.getElementById('breadcrumb-name').textContent = p.name;

      function inlineStars(avg) {
        const rounded = Math.round(avg);
        return Array.from({length:5}, (_,i) => `
          <span style="display:inline-flex;width:14px;height:14px">
            <svg viewBox="0 0 24 24" fill="${i < rounded ? 'var(--red)' : 'var(--border)'}" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </span>`).join('');
      }

      content.innerHTML = `
        <div class="product-layout">

          <!-- Visual -->
          <div class="product-visual">
            <div class="product-main-thumb" style="background:transparent">
              ${p.inventory <= 0 ? '<div class="product-oos-overlay"><div class="product-oos-banner">Out of Stock</div></div>' : ''}
              ${p.badge ? `<div class="product-visual-badge">${p.badge}</div>` : ''}
              <div class="product-svg-wrap">
                ${p.images
                  ? '<img src="pdct img/' + p.images + '" alt="' + p.name + '" style="height:75%;width:auto;object-fit:contain;object-position:center;display:block;margin:auto" />'
                  : pepperSVG(p)
                }
              </div>
            </div>
            <div class="product-research-tag">
              ⚠️ For research purposes only · Not intended for human consumption · Handle with care
            </div>
          </div>

          <!-- Info -->
          <div class="product-info-panel">
            <div class="product-cat-tag">${p.category}</div>
            <div class="product-title">${p.name}</div>

            <div class="product-info-row" style="margin-top:10px">
              <span class="product-info-label">Rate</span>
              <div id="inline-review-stars" style="display:flex;gap:4px;align-items:center">
                ${Array.from({length:5}, (_,i) => `
                  <button style="background:none;padding:0;cursor:pointer;display:inline-flex;transition:transform .12s" onmouseenter="hoverInlineStars(${i+1})" onmouseleave="resetInlineStars()" onclick="rateProduct(${i+1})">
                    <svg viewBox="0 0 24 24" fill="${i < Math.round(rating.average) ? 'var(--red)' : 'var(--border)'}" width="20" height="20"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                  </button>`).join('')}
              </div>
              <span id="inline-review-count" style="font-family:var(--font-c);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--smoke)">
                ${rating.count === 0 ? 'No reviews' : `${rating.count} review${rating.count !== 1 ? 's' : ''}`}
              </span>
              <span id="inline-rating-saved" style="font-family:var(--font-c);font-size:.63rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#5BC75B;display:none">✓ Saved</span>
            </div>

            <div class="product-description">${p.description}</div>

            <div class="product-divider"></div>

            <div class="product-price-row">
              <span class="product-price-big">$${Number(p.price).toFixed(2)}</span>
              <span class="product-price-note">per unit</span>
            </div>

            <div class="product-actions">
              <div class="qty-control">
                <button class="qty-dec" onclick="changeQty(-1)">−</button>
                <div class="qty-display" id="qty-display">1</div>
                <button class="qty-inc" onclick="changeQty(1)">+</button>
              </div>
              <button class="add-to-cart-btn" id="add-btn"
                onclick="${p.inventory > 0 ? 'addToCart(' + p.id + ')' : ''}"
                ${p.inventory <= 0 ? 'disabled style="background:var(--border);color:var(--smoke);cursor:not-allowed;clip-path:none;opacity:.5"' : ''}>
                ${p.inventory <= 0 ? 'Out of Stock' : 'Add to Cart — $' + Number(p.price).toFixed(2)}
              </button>
            </div>

            <div class="product-details">
              <div class="detail-row">
                <div class="detail-key">Category</div>
                <div class="detail-val">${p.category}</div>
              </div>
              <div class="detail-row">
                <div class="detail-key">Use</div>
                <div class="detail-val">Research purposes only</div>
              </div>
              <div class="detail-row">
                <div class="detail-key">Consumption</div>
                <div class="detail-val">Not for human consumption</div>
              </div>
              <div class="detail-row">
                <div class="detail-key">Status</div>
                <div class="detail-val" style="color:${p.inventory <= 0 ? '#FF3030' : p.inventory <= 10 ? '#E8B84B' : '#5BC75B'}">
                  ${p.inventory <= 0 ? 'Out of Stock' : p.inventory <= 10 ? 'Low Stock — ' + p.inventory + ' left' : 'In Stock'}
                </div>
              </div>
            </div>
          </div>

        </div>`;
    }

    /* ── Qty control ── */
    let qty = 1;
    window.changeQty = function(delta) {
      const product = getProduct(productId);
      if (!product) return;
      const maxQty = product.inventory || 0;
      qty = Math.max(1, Math.min(maxQty, qty + delta));
      const el = document.getElementById('qty-display');
      if (el) el.textContent = qty;
    };

    /* ── Add to cart ── */
    window.addToCart = function(id) {
      const p = getProduct(id);
      if (!p) return;
      for (let i = 0; i < qty; i++) Cart.add(p);

      const btn = document.getElementById('add-btn');
      if (btn) {
        btn.textContent = '✓ Added';
        btn.classList.add('added');
        setTimeout(() => {
          btn.textContent = 'Add to Cart';
          btn.classList.remove('added');
        }, 1800);
      }

      const toast = document.getElementById('add-toast');
      toast.textContent = `${qty}× ${p.name} added to cart`;
      toast.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => toast.classList.remove('show'), 2400);
    };

    /* ── Related products ── */
    function renderRelated(current) {
      const others = allProducts()
        .filter(p => p.id !== current.id && p.category === current.category)
        .slice(0, 4);

      // fallback: if fewer than 2 in same category, fill from any category
      const fill = others.length < 2
        ? allProducts().filter(p => p.id !== current.id && !others.find(o => o.id === p.id)).slice(0, 4 - others.length)
        : [];

      const related = [...others, ...fill].slice(0, 4);
      if (!related.length) return;

      const section = document.getElementById('related-section');
      const grid    = document.getElementById('related-grid');
      section.style.display = 'block';

      grid.innerHTML = related.map(p => `
        <div class="related-card" onclick="window.location.href='product.html?id=${p.id}'">
          <div class="related-thumb" style="background:${p.thumb_color}">
            ${miniPepperSVG(p)}
          </div>
          <div class="related-info">
            <div class="related-name">${p.name}</div>
            <div class="related-price">$${Number(p.price).toFixed(2)}</div>
          </div>
        </div>`).join('');
    }

    /* ══════════════════════════════════════════════
       REVIEWS
    ══════════════════════════════════════════════ */

    /* SVG star — filled, empty, or half using CSS color */
    function starSVG(filled) {
      const col = filled ? 'var(--red)' : 'var(--border)';
      return `<svg viewBox="0 0 24 24" fill="${col}" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>`;
    }

    /* Render N filled stars + (5-N) empty, for display */
    function starsHTML(avg) {
      const rounded = Math.round(avg);
      return Array.from({length:5}, (_,i) => `
        <span class="star">${starSVG(i < rounded)}</span>
      `).join('');
    }

    /* Interactive star picker — highlights on hover, saves on click */
    function starPickerHTML(currentStars) {
      return Array.from({length:5}, (_,i) => `
        <button class="star-btn" data-star="${i+1}"
          onmouseenter="hoverStars(${i+1})"
          onmouseleave="resetStars(${currentStars})"
          onclick="rateProduct(${i+1})">
          ${starSVG(i < currentStars)}
        </button>
      `).join('');
    }

    window.hoverInlineStars = function(n) {
      document.querySelectorAll('#inline-review-stars button svg').forEach((svg, i) => {
        svg.setAttribute('fill', i < n ? 'var(--red)' : 'var(--border)');
      });
    };

    window.resetInlineStars = function() {
      document.querySelectorAll('#inline-review-stars button svg').forEach((svg, i) => {
        svg.setAttribute('fill', i < _currentUserStars ? 'var(--red)' : 'var(--border)');
      });
    };

    window.hoverStars = function(n) {
      document.querySelectorAll('.star-btn').forEach((btn, i) => {
        btn.innerHTML = starSVG(i < n);
      });
    };

    window.resetStars = function(current) {
      document.querySelectorAll('.star-btn').forEach((btn, i) => {
        btn.innerHTML = starSVG(i < current);
      });
    };

    let _currentUserStars = 0;

    window.rateProduct = async function(stars) {
      const result = await Auth.submitReview(productId, stars);
      if (!result.ok) return;
      _currentUserStars = stars;
      resetStars(stars);
      resetInlineStars();
      // Show saved on both pickers
      const saved = document.getElementById('rating-saved');
      if (saved) { saved.classList.add('show'); setTimeout(() => saved.classList.remove('show'), 2500); }
      const inlineSaved = document.getElementById('inline-rating-saved');
      if (inlineSaved) { inlineSaved.style.display = 'inline'; setTimeout(() => inlineSaved.style.display = 'none', 2500); }
      // Update counts
      const rating = await Auth.getProductRating(productId);
      renderRatingSummary(rating);
      document.querySelectorAll('.star-btn').forEach(b => b.setAttribute('onmouseleave', `resetStars(${stars})`));
      const inlineCount = document.getElementById('inline-review-count');
      if (inlineCount) inlineCount.textContent = rating.count === 0 ? 'No reviews' : rating.count + ' review' + (rating.count !== 1 ? 's' : '');
    };

    function renderRatingSummary({ average, count }) {
      document.getElementById('reviews-summary').innerHTML = count > 0 ? `
        <div class="review-avg">${average}</div>
        <div class="review-stars-display">${starsHTML(average)}</div>
        <div class="review-count">${count} review${count !== 1 ? 's' : ''}</div>
      ` : `
        <div class="review-stars-display">${starsHTML(0)}</div>
        <div class="review-count" style="color:var(--smoke)">No reviews yet — be the first</div>
      `;
    }

    async function renderReviews(pid, rating) {
      if (!rating) rating = await Auth.getProductRating(pid);
      await refreshReviews();
    }

    let _allReviews = [];
    let _currentUserId = null;

    window.submitReviewWithComment = async function() {
      const stars    = _currentUserStars || parseInt(document.getElementById('review-stars-pick')?.value || '0');
      const comment  = document.getElementById('review-comment')?.value.trim() || '';
      const username = document.getElementById('review-username')?.value.trim() || '';
      const errEl    = document.getElementById('review-err');
      if (!stars)    { if (errEl) errEl.textContent = 'Please select a star rating.'; return; }
      if (!comment)  { if (errEl) errEl.textContent = 'Please write a comment.'; return; }
      if (!username) { if (errEl) errEl.textContent = 'Please enter a display name.'; return; }
      if (errEl) errEl.textContent = '';
      const result = await Auth.submitReview(productId, stars, comment, username);
      if (!result.ok) { if (errEl) errEl.textContent = result.err; return; }
      document.getElementById('review-form-wrap').style.display = 'none';
      await refreshReviews();
    };

    let _formStars = 0;
    const STAR_LABELS = ['','Poor','Fair','Good','Great','Excellent'];

    window.hoverFormStars = function(n) {
      for (var i = 1; i <= 5; i++) {
        var s = document.getElementById('fstar-'+i);
        if (s) s.setAttribute('fill', i <= n ? 'var(--red)' : 'var(--border)');
      }
      var lbl = document.getElementById('form-star-label');
      if (lbl) lbl.textContent = STAR_LABELS[n] || '';
    };

    window.resetFormStars = function() {
      for (var i = 1; i <= 5; i++) {
        var s = document.getElementById('fstar-'+i);
        if (s) s.setAttribute('fill', i <= _formStars ? 'var(--red)' : 'var(--border)');
      }
      var lbl = document.getElementById('form-star-label');
      if (lbl) lbl.textContent = _formStars ? STAR_LABELS[_formStars] : '';
    };

    window.pickFormStar = function(n) {
      _formStars = n;
      _currentUserStars = n;
      resetFormStars();
    };

    window.editReview = function() {
      const myReview = _allReviews.find(r => r.user_id === _currentUserId);
      const wrap = document.getElementById('review-form-wrap');
      if (myReview) {
        document.getElementById('review-username').value = myReview.username || '';
        document.getElementById('review-comment').value  = myReview.comment  || '';
        _formStars = myReview.stars || _currentUserStars || 0;
      } else {
        _formStars = _currentUserStars || 0;
      }
      resetFormStars();
      wrap.style.display = 'block';
      wrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
    };

    window.deleteReview = async function() {
      if (!confirm('Delete your review?')) return;
      await Auth.deleteReview(productId);
      await refreshReviews();
    };

    window.sortAndRenderList = function() {
      renderReviewList(_allReviews, _currentUserId);
    };

    function renderReviewList(rows, currentUserId) {
      const sort   = document.getElementById('reviews-sort')?.value || 'desc';
      const sorted = [...rows].sort((a,b) => sort === 'desc' ? b.stars - a.stars : a.stars - b.stars);
      const header = document.getElementById('reviews-list-header');
      const list   = document.getElementById('reviews-list');
      if (!sorted.length) {
        if (header) header.style.display = 'none';
        list.innerHTML = '<div style="font-family:var(--font-c);font-size:.68rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--smoke);padding:16px 0">No written reviews yet.</div>';
        return;
      }
      if (header) header.style.display = 'flex';
      list.innerHTML = sorted.map(r => {
        const isOwn = r.user_id === currentUserId;
        const stars = Array.from({length:5},(_,i)=>`<svg viewBox="0 0 24 24" fill="${i<r.stars?'var(--red)':'var(--border)'}" width="13" height="13"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`).join('');
        const date  = new Date(r.updated_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        return `<div class="review-card">
          <div class="review-card-header">
            <span class="review-card-username">${r.username || 'Researcher'}</span>
            <span style="font-family:var(--font-c);font-size:.6rem;color:var(--smoke);letter-spacing:.08em">rated this ${r.stars} star${r.stars!==1?'s':''}</span>
            <div class="review-card-stars">${stars}</div>
            <span class="review-card-date">${date}</span>
          </div>
          <div class="review-card-comment">${r.comment}</div>
          ${isOwn ? '<div class="review-card-actions"><button class="review-action-btn" onclick="editReview()">Edit</button><button class="review-action-btn del" onclick="deleteReview()">Delete</button></div>' : ''}
        </div>`;
      }).join('');
    }

    async function refreshReviews() {
      const [rating, { rows, currentUserId }] = await Promise.all([
        Auth.getProductRating(productId),
        Auth.getReviews(productId),
      ]);
      _allReviews      = rows;
      _currentUserId   = currentUserId;
      _currentUserStars = rating.userStars;
      renderRatingSummary(rating);
      renderReviewList(rows, currentUserId);
      const hasMyReview = rows.find(r => r.user_id === currentUserId);
      document.getElementById('your-rating-panel').innerHTML =
        '<span class="your-rating-label">Your Rating</span>'
        + '<div class="star-picker">' + starPickerHTML(rating.userStars) + '</div>'
        + '<button onclick="editReview()" style="font-family:var(--font-c);font-size:.63rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:none;color:var(--red);padding:6px 12px;border:1px solid rgba(204,31,31,.3);cursor:pointer;margin-left:8px;transition:all .18s" onmouseover="this.style.background='rgba(204,31,31,.1)'" onmouseout="this.style.background='none'">' + (hasMyReview ? 'Edit Review' : '+ Write Review') + '</button>'
        + '<span class="rating-saved" id="rating-saved">✓ Saved</span>';
      const inlineCount = document.getElementById('inline-review-count');
      if (inlineCount) inlineCount.textContent = rating.count === 0 ? 'No reviews' : rating.count + ' review' + (rating.count!==1?'s':'');
    }

  </script>
</body>
</html>
