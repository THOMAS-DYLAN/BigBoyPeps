<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/webp" href="img/logo.webp">
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="apple-touch-icon" href="img/logo.png">
  <link rel="preconnect" href="https://utqviljholfvpfztfuvx.supabase.co" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — 956 Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="modulepreload" href="../js/supabase.js">
  <link rel="modulepreload" href="../js/auth.js?v=15">
  <link rel="modulepreload" href="../js/cart.js?v=19">
  <link rel="modulepreload" href="./site.js">
  <link rel="modulepreload" href="../js/products.js?v=15">
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/mobile.css"/>
  <style>
    body { display:flex; flex-direction:column; min-height:100vh; }
    .container { max-width:1140px; margin:0 auto; padding:0 16px; }

    .cart-header { padding:44px 0 28px; border-bottom:1px solid var(--border); position:relative; overflow:hidden; }
    .cart-header::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(to right, var(--green) 33.3%, rgba(240,244,239,.15) 33.3% 66.6%, var(--red) 66.6%); }
    .cart-eyebrow { font-family:var(--font-c); font-size:.63rem; font-weight:700; letter-spacing:.28em; text-transform:uppercase; color:var(--green-hi); margin-bottom:8px; display:flex; align-items:center; gap:10px; }
    .cart-eyebrow::before { content:''; width:20px; height:2px; background:var(--green); }
    .cart-title { font-family:var(--font-d); font-size:clamp(2rem,5vw,3.8rem); line-height:.92; letter-spacing:.03em; color:#111111; }
    .cart-title em { color:var(--green); font-style:normal; }

    .cart-body { padding:36px 0 80px; flex:1; }
    .cart-layout { display:grid; grid-template-columns:1fr 320px; gap:32px; align-items:start; }

    .cart-items-head { display:flex; align-items:center; justify-content:space-between; padding-bottom:10px; border-bottom:1px solid var(--border); margin-bottom:4px; }
    .cart-items-label { font-family:var(--font-c); font-size:.62rem; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:#888888; }
    .clear-btn { font-family:var(--font-c); font-size:.6rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#888888; text-decoration:underline; text-underline-offset:3px; transition:color .18s; background:none; border:none; cursor:pointer; }
    .clear-btn:hover { color:var(--red-hi); }

    .cart-item { display:grid; grid-template-columns:64px 1fr auto; gap:12px; padding:16px 0; border-bottom:1px solid var(--border); align-items:center; }
    .cart-thumb { width:64px; height:64px; background:#FFFFFF; border:1px solid #D8D8D8; display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
    .cart-thumb img { width:50px; height:50px; object-fit:contain; }
    .item-name { font-family:var(--font-c); font-size:.87rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:#111111; margin-bottom:2px; }
    .item-research { font-size:.64rem; color:#888888; font-style:italic; margin-bottom:7px; }
    .qty-controls { display:flex; align-items:center; gap:7px; }
    .qty-btn { width:25px; height:25px; border:1px solid #D8D8D8; color:#444444; font-size:.92rem; display:flex; align-items:center; justify-content:center; transition:all .15s; background:transparent; cursor:pointer; border-radius:2px; }
    .qty-btn:hover { border-color:var(--green); color:var(--green-hi); }
    .qty-val { font-family:var(--font-c); font-size:.85rem; font-weight:700; color:#111111; min-width:18px; text-align:center; }
    .item-right { text-align:right; }
    .item-price { font-family:var(--font-d); font-size:1.2rem; color:#111111; letter-spacing:.04em; margin-bottom:5px; }
    .remove-btn { font-family:var(--font-c); font-size:.58rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#888888; text-decoration:underline; text-underline-offset:3px; transition:color .15s; background:none; border:none; cursor:pointer; }
    .remove-btn:hover { color:var(--red-hi); }

    .cart-empty { text-align:center; padding:72px 0; grid-column:1/-1; }
    .cart-empty h2 { font-family:var(--font-d); font-size:1.7rem; letter-spacing:.06em; color:#111111; margin-bottom:8px; }
    .cart-empty p { font-size:.83rem; color:#888888; margin-bottom:22px; }
    .back-shop { display:inline-flex; align-items:center; font-family:var(--font-c); font-size:.7rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; background:var(--green); color:#fff; padding:11px 26px; border-radius:2px; transition:background .18s; text-decoration:none; }
    .back-shop:hover { background:var(--green-hi); }

    .summary-panel { background:#F6F6F6; border:1px solid #D8D8D8; padding:22px; position:sticky; top:78px; border-radius:2px; }
    .summary-title { font-family:var(--font-d); font-size:1.35rem; letter-spacing:.06em; color:#111111; margin-bottom:16px; }
    .summary-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:.81rem; color:#888888; }
    .summary-row .val { color:#1A1A1A; }
    .summary-total { display:flex; justify-content:space-between; align-items:baseline; padding:14px 0 0; margin-top:4px; border-top:1px solid var(--border); }
    .summary-total-label { font-family:var(--font-c); font-size:.65rem; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:#888888; }
    .summary-total-val { font-family:var(--font-d); font-size:1.85rem; color:#111111; letter-spacing:.04em; }
    .checkout-cta { width:100%; padding:13px; margin-top:16px; font-family:var(--font-c); font-size:.78rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase; background:var(--green); color:#fff; border-radius:2px; border:none; transition:background .2s; cursor:pointer; }
    .checkout-cta:hover { background:var(--green-hi); }
    .checkout-cta:disabled { background:var(--border); color:#888888; cursor:not-allowed; }
    .summary-disclaimer { font-size:.6rem; color:#888888; text-align:center; margin-top:11px; line-height:1.6; font-style:italic; }
    .continue-link { display:block; text-align:center; margin-top:11px; font-family:var(--font-c); font-size:.63rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#888888; text-decoration:underline; text-underline-offset:3px; transition:color .18s; }
    .continue-link:hover { color:#1A1A1A; }

    /* Discount on cart page */
    .discount-row { margin:12px 0; }
    .discount-input-wrap { display:flex; gap:8px; }
    .discount-input-wrap input { flex:1; }
    .discount-apply { font-family:var(--font-c); font-size:.65rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; background:var(--green); color:#fff; padding:0 14px; border:none; border-radius:2px; cursor:pointer; white-space:nowrap; transition:background .18s; }
    .discount-apply:hover { background:var(--green-hi); }

    @media (max-width:800px) { .cart-layout { grid-template-columns:1fr; } .summary-panel { position:static; } }
    @media (max-width:500px)  { .cart-item { grid-template-columns:50px 1fr; } .item-right { display:none; } }
  </style>
  <meta name="robots" content="noindex,nofollow">
</head>
<body>
  <div id="nav-mount"></div>
  <div id="banner-mount"></div>

  <div class="cart-header">
    <div class="container">
      <div class="cart-eyebrow">Your Cart</div>
      <div class="cart-title">Ready to <em>Order?</em></div>
    </div>
  </div>

  <div class="cart-body">
    <div class="container">
      <div class="cart-layout" id="cart-layout"></div>
    </div>
  </div>

  <div id="footer-mount"></div>

  <!-- Checkout overlay — cart.js injects content into #checkout-modal -->
  <div class="checkout-overlay" id="checkout-overlay" onclick="if(event.target===this)closeCheckout()">
    <div class="checkout-modal" id="checkout-modal"></div>
  </div>

  <script type="module">
    import '../js/auth.js?v=15';
    import '../js/cart.js?v=19';
    import './site.js';
    await import('./site.js');
    import { loadProducts, getProduct, miniPepperSVG } from '../js/products.js?v=15';

    await Promise.all([window.initPage('cart'), loadProducts()]);

    window.renderCart = function() {
      const items  = Cart.get();
      const layout = document.getElementById('cart-layout');
      Cart.updateBadge();

      if (!items.length) {
        layout.innerHTML = '<div class="cart-empty"><div style="font-size:2.6rem;margin-bottom:16px;opacity:.3">🧪</div>'
          + '<h2>Your cart is empty.</h2>'
          + '<p>Looks like you haven\'t added anything yet.</p>'
          + '<a href="dashboard.html" class="back-shop">Back to Shop</a></div>';
        return;
      }

      const subtotal = items.reduce((s,i) => s + i.price * i.qty, 0);
      const discount = window.getDiscount ? window.getDiscount() : null;
      const discAmt  = discount ? Math.round(subtotal * discount.pct) / 100 : 0;
      const total    = subtotal - discAmt + 15;

      const itemRows = items.map(item => {
        const p = getProduct(item.id);
        const imgHtml = p?.images
          ? '<img src="../pdct img/' + p.images + '" alt="' + item.name + '"/>'
          : (p ? miniPepperSVG(p) : '');
        return '<div class="cart-item">'
          + '<div class="cart-thumb">' + imgHtml + '</div>'
          + '<div>'
          + '<div class="item-name">' + item.name + '</div>'
          + '<div class="item-research">For research purposes only</div>'
          + '<div class="qty-controls">'
          + (item.isBundle ? '' : '<button class="qty-btn" onclick="chQty(' + item.id + ',-1)">−</button>')
          + '<span class="qty-val">' + item.qty + '</span>'
          + (item.isBundle ? '' : '<button class="qty-btn" onclick="chQty(' + item.id + ',1)">+</button>')
          + '</div></div>'
          + '<div class="item-right">'
          + '<div class="item-price">$' + (item.price * item.qty).toFixed(2) + '</div>'
          + '<button class="remove-btn" onclick="rmItem(' + item.id + ')">Remove</button>'
          + '</div></div>';
      }).join('');

      layout.innerHTML = '<div>'
        + '<div class="cart-items-head">'
        + '<span class="cart-items-label">' + items.reduce((s,i)=>s+i.qty,0) + ' item' + (items.reduce((s,i)=>s+i.qty,0)!==1?'s':'') + '</span>'
        + '<button class="clear-btn" onclick="Cart.clear();renderCart()">Clear all</button>'
        + '</div>'
        + itemRows
        + '<div class="discount-row">'
        + '<div class="discount-input-wrap">'
        + '<input id="discount-input" type="text" placeholder="Discount code" style="text-transform:uppercase"/>'
        + '<button class="discount-apply" onclick="applyDiscount(document.getElementById(\'discount-input\').value)">Apply</button>'
        + '</div>'
        + '<div id="discount-err" class="err"></div>'
        + '<div id="discount-ok" class="ok"></div>'
        + '</div>'
        + '</div>'
        + '<div class="summary-panel">'
        + '<div class="summary-title">Order Summary</div>'
        + '<div class="summary-row"><span>Subtotal</span><span class="val">$' + subtotal.toFixed(2) + '</span></div>'
        + (discount ? '<div class="summary-row" style="color:var(--ok)"><span>' + discount.code + ' (' + discount.pct + '% off)</span><span>-$' + discAmt.toFixed(2) + '</span></div>' : '')
        + '<div class="summary-row"><span>Shipping</span><span class="val">From $15.00</span></div>'
        + '<div class="summary-row" style="font-size:.7rem;font-style:italic;border-bottom:none"><span>USPS Standard or UPS 2-Day — selected at checkout</span></div>'
        + '<div class="summary-total"><span class="summary-total-label">Est. Total</span><span class="summary-total-val">$' + total.toFixed(2) + '</span></div>'
        + '<button class="checkout-cta" onclick="openCheckout()">Proceed to Checkout</button>'
        + '<p class="summary-disclaimer">All products are for research purposes only and not intended for human consumption.</p>'
        + '<a href="dashboard.html" class="continue-link">← Continue Shopping</a>'
        + '</div>';
    };

    window.chQty = (id, delta) => {
      const items = Cart.get();
      const item  = items.find(i => i.id === id);
      if (!item) return;
      if (item.qty + delta < 1) { rmItem(id); return; }
      const p   = getProduct(id);
      const max = item.isBundle ? Math.floor((p?.inventory??0)/(item.bundleQty||10)) : (p?.inventory??999);
      if (item.qty + delta > max) return;
      Cart.setQty(id, item.qty + delta);
      window.renderCart();
    };
    window.rmItem = id => { Cart.remove(id); window.renderCart(); };

    window.renderCart();
  </script>
</body>
</html>
