<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/webp" href="img/logo.webp">
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="apple-touch-icon" href="img/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — 956 Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/mobile.css"/>
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .reset-box { width:100%; max-width:390px; padding:0 24px; animation:fadeUp .5s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    .reset-logo { display:block; height:68px; width:auto; object-fit:contain; margin:0 auto 12px; }
    .reset-brand { font-family:var(--font-d); font-size:1.9rem; letter-spacing:.08em; color:#111111; margin-bottom:3px; text-align:center; }
    .reset-brand span { color:var(--green); }
    .reset-sub { font-family:var(--font-c); font-size:.6rem; font-weight:700; letter-spacing:.28em; text-transform:uppercase; color:#888888; text-align:center; margin-bottom:28px; }
    .reset-flag { height:2px; background:linear-gradient(to right, var(--green) 33.3%, rgba(240,244,239,.2) 33.3% 66.6%, var(--red) 66.6%); margin-bottom:24px; }
    .reset-title { font-family:var(--font-d); font-size:1.65rem; letter-spacing:.04em; color:#111111; margin-bottom:5px; }
    .reset-desc { font-size:.79rem; color:#888888; margin-bottom:20px; line-height:1.65; }
    .reset-submit { width:100%; padding:12px; font-family:var(--font-c); font-size:.75rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase; background:var(--green); color:#fff; border-radius:3px; border:none; transition:background .2s, transform .2s; margin-top:4px; cursor:pointer; }
    .reset-submit:hover { background:var(--green-hi); transform:translateY(-1px); }
    .reset-error { font-family:var(--font-c); font-size:.67rem; font-weight:600; letter-spacing:.06em; color:#f77; margin-top:9px; min-height:16px; }
    .reset-switch { font-size:.74rem; color:#888888; margin-top:14px; text-align:center; }
    .reset-switch a { color:var(--green-hi); }
    .reset-ok { display:none; margin-top:11px; font-family:var(--font-c); font-size:.68rem; font-weight:700; letter-spacing:.1em; color:var(--ok); }
  </style>
  <meta name="robots" content="noindex,nofollow">
</head>
<body>
  <div class="reset-box">
    <img src="img/logo.png" alt="956 Labs" class="reset-logo"/>
    <div class="reset-brand">956 <span>Labs</span></div>
    <div class="reset-sub">Research Peptides · Rio Grande Valley</div>
    <div class="reset-flag"></div>

    <!-- Request reset link -->
    <div id="view-request">
      <div class="reset-title">Reset your password.</div>
      <p class="reset-desc">Enter your email and we'll send a link to set a new password.</p>
      <div class="field"><label>Email</label><input type="email" id="reset-email" placeholder="you@example.com"/></div>
      <button class="reset-submit" onclick="sendLink()">Send Reset Link</button>
      <div class="reset-error" id="reset-err"></div>
      <div class="reset-ok" id="reset-ok">Reset link sent — check your email.</div>
      <p class="reset-switch"><a href="dashboard.html">← Back to sign in</a></p>
    </div>

    <!-- New password (PKCE recovery flow) -->
    <div id="view-newpass" style="display:none">
      <div class="reset-title">Set new password.</div>
      <p class="reset-desc">Enter a new password for your 956 Labs account.</p>
      <div class="field"><label>New Password (8+ chars)</label><input type="password" id="new-pass" placeholder="••••••••"/></div>
      <div class="field"><label>Confirm Password</label><input type="password" id="confirm-pass" placeholder="••••••••"/></div>
      <button class="reset-submit" onclick="doReset()">Set New Password</button>
      <div class="reset-error" id="newpass-err"></div>
    </div>
  </div>

  <script type="module">
    import { supabase } from '../js/supabase.js';
    window.__BBP_RECOVERY_MODE__ = true;

    // Check for recovery token in URL hash (PKCE flow)
    if (window.location.hash.includes('type=recovery') || window.location.hash.includes('access_token')) {
      const { data } = await supabase.auth.getSession();
      if (data.session) {
        document.getElementById('view-request').style.display = 'none';
        document.getElementById('view-newpass').style.display = '';
      }
    }

    window.sendLink = async () => {
      const email = document.getElementById('reset-email').value.trim().toLowerCase();
      const err   = document.getElementById('reset-err');
      const ok    = document.getElementById('reset-ok');
      const btn   = document.querySelector('#view-request .reset-submit');
      err.textContent = ''; ok.style.display = 'none';
      if (!email) { err.textContent = 'Please enter your email.'; return; }
      btn.disabled = true; btn.textContent = 'Sending…';
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://bigboypeps.com/956labs/reset.html',
      });
      btn.disabled = false; btn.textContent = 'Send Reset Link';
      if (error) { err.textContent = error.message; return; }
      ok.style.display = 'block';
    };

    window.doReset = async () => {
      const pass    = document.getElementById('new-pass').value;
      const confirm = document.getElementById('confirm-pass').value;
      const err     = document.getElementById('newpass-err');
      const btn     = document.querySelector('#view-newpass .reset-submit');
      err.textContent = '';
      if (pass.length < 8) { err.textContent = 'Password must be at least 8 characters.'; return; }
      if (pass !== confirm) { err.textContent = 'Passwords do not match.'; return; }
      btn.disabled = true; btn.textContent = 'Updating…';
      const { error } = await supabase.auth.updateUser({ password: pass });
      if (error) { err.textContent = error.message; btn.disabled = false; btn.textContent = 'Set New Password'; return; }
      err.style.color = 'var(--ok)';
      err.textContent = 'Password updated! Redirecting…';
      setTimeout(() => window.location.replace('index.html'), 2000);
    };
  </script>
</body>
</html>
