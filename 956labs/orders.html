<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://utqviljholfvpfztfuvx.supabase.co" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order History — 956 Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="modulepreload" href="../js/supabase.js">
  <link rel="modulepreload" href="../js/auth.js?v=15">
  <link rel="modulepreload" href="../js/cart.js?v=18">
  <link rel="modulepreload" href="../js/products.js?v=15">
  <link rel="stylesheet" href="css/global.css"/>
  <style>
    body { display:flex; flex-direction:column; min-height:100vh; }
    .container { max-width:1140px; margin:0 auto; padding:0 16px; }

    .orders-header { padding:44px 0 28px; border-bottom:1px solid var(--border); position:relative; overflow:hidden; }
    .orders-header::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(to right, var(--green) 33.3%, rgba(240,244,239,.15) 33.3% 66.6%, var(--red) 66.6%); }
    .orders-eyebrow { font-family:var(--font-c); font-size:.63rem; font-weight:700; letter-spacing:.28em; text-transform:uppercase; color:var(--green-hi); margin-bottom:8px; display:flex; align-items:center; gap:10px; }
    .orders-eyebrow::before { content:''; width:20px; height:2px; background:var(--green); }
    .orders-title { font-family:var(--font-d); font-size:clamp(2rem,5vw,3.8rem); line-height:.92; letter-spacing:.03em; color:var(--white); }
    .orders-title em { color:var(--green); font-style:normal; }

    .orders-body { padding:32px 0 80px; flex:1; }

    .orders-summary { display:flex; align-items:center; background:var(--off); border:1px solid var(--border); margin-bottom:28px; border-radius:2px; overflow:hidden; }
    .stat { flex:1; padding:18px 22px; text-align:center; }
    .stat-val { font-family:var(--font-d); font-size:1.85rem; letter-spacing:.04em; color:var(--white); }
    .stat-label { font-family:var(--font-c); font-size:.58rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--smoke); margin-top:3px; }
    .stat-divider { width:1px; background:var(--border); align-self:stretch; }

    .month-group { margin-bottom:32px; }
    .month-label { font-family:var(--font-c); font-size:.6rem; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--smoke); margin-bottom:12px; padding-bottom:7px; border-bottom:1px solid var(--border); }

    .order-card { display:flex; gap:12px; align-items:center; background:var(--card); border:1px solid var(--border); padding:14px 16px; margin-bottom:7px; border-radius:2px; transition:border-color .18s; }
    .order-card:hover { border-color:var(--green-lo); }
    .order-thumb { width:50px; height:50px; background:var(--off); border:1px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .order-thumb img { width:38px; height:38px; object-fit:contain; }
    .order-body { flex:1; min-width:0; }
    .order-name { font-family:var(--font-c); font-size:.87rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--white); margin-bottom:5px; }
    .order-meta { display:flex; gap:14px; flex-wrap:wrap; }
    .meta-item { display:flex; flex-direction:column; gap:1px; }
    .meta-label { font-family:var(--font-c); font-size:.55rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--smoke); }
    .meta-val { font-family:var(--font-c); font-size:.72rem; font-weight:600; color:var(--text); }
    .order-right { text-align:right; flex-shrink:0; }
    .order-total { font-family:var(--font-d); font-size:1.2rem; letter-spacing:.04em; color:var(--white); margin-bottom:6px; }
    .review-link { font-family:var(--font-c); font-size:.58rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--green-hi); text-decoration:underline; text-underline-offset:3px; }
    .review-link:hover { color:var(--green); }

    .empty-state { text-align:center; padding:72px 0; }
    .empty-icon  { font-size:2.8rem; margin-bottom:14px; opacity:.3; }
    .empty-title { font-family:var(--font-d); font-size:1.7rem; letter-spacing:.06em; color:var(--white); margin-bottom:8px; }
    .empty-sub   { font-size:.82rem; color:var(--smoke); margin-bottom:22px; }
    .empty-cta   { display:inline-block; font-family:var(--font-c); font-size:.7rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; background:var(--green); color:#fff; padding:10px 24px; border-radius:2px; transition:background .18s; text-decoration:none; }
    .empty-cta:hover { background:var(--green-hi); }

    @media (max-width:600px) { .order-card { flex-wrap:wrap; } .order-right { width:100%; text-align:left; } .orders-summary { flex-direction:column; } .stat-divider { width:100%; height:1px; } }
  </style>
</head>
<body>
  <div id="nav-mount"></div>
  <div id="banner-mount"></div>

  <div class="orders-header">
    <div class="container">
      <div class="orders-eyebrow">Your Account</div>
      <div class="orders-title">Order <em>History</em></div>
    </div>
  </div>

  <div class="orders-body">
    <div class="container">
      <div class="orders-summary" id="orders-summary" style="display:none"></div>
      <div id="orders-list"><p style="color:var(--smoke)">Loading orders…</p></div>
    </div>
  </div>

  <div id="footer-mount"></div>

  <script type="module">
    import '../js/auth.js?v=15';
    import '../js/cart.js?v=18';
    await import('./site.js');
    import { loadProducts, getProduct, miniPepperSVG } from '../js/products.js?v=15';

    const [,,orders] = await Promise.all([
      window.initPage('orders'),
      loadProducts(),
      Auth.getAllOrders(),
    ]);

    const summaryEl = document.getElementById('orders-summary');
    const listEl    = document.getElementById('orders-list');

    if (!orders.length) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🧪</div>'
        + '<div class="empty-title">No orders yet.</div>'
        + '<p class="empty-sub">Time to fix that.</p>'
        + '<a href="shop.html" class="empty-cta">Go to Shop</a></div>';
    } else {
      const totalSpent = orders.reduce((s,o) => s + Number(o.total), 0);
      const totalItems = orders.reduce((s,o) => s + o.qty, 0);
      summaryEl.style.display = 'flex';
      summaryEl.innerHTML =
        '<div class="stat"><div class="stat-val">' + orders.length + '</div><div class="stat-label">Orders</div></div>'
        + '<div class="stat-divider"></div>'
        + '<div class="stat"><div class="stat-val">$' + totalSpent.toFixed(2) + '</div><div class="stat-label">Total Spent</div></div>'
        + '<div class="stat-divider"></div>'
        + '<div class="stat"><div class="stat-val">' + totalItems + '</div><div class="stat-label">Items</div></div>';

      const groups = {};
      orders.forEach(o => {
        const key = new Date(o.ordered_at).toLocaleDateString('en-US', { month:'long', year:'numeric' });
        if (!groups[key]) groups[key] = [];
        groups[key].push(o);
      });

      listEl.innerHTML = Object.entries(groups).map(([month, rows]) =>
        '<div class="month-group"><div class="month-label">' + month + '</div>'
        + rows.map(o => {
          const p = getProduct(o.product_id);
          const img = p?.images ? '<img src="../pdct img/' + p.images + '" alt="' + o.product_name + '"/>' : (p ? miniPepperSVG(p) : '');
          const date = new Date(o.ordered_at).toLocaleDateString('en-US', { month:'short', day:'numeric' });
          return '<div class="order-card">'
            + '<div class="order-thumb">' + img + '</div>'
            + '<div class="order-body">'
            + '<div class="order-name">' + o.product_name + '</div>'
            + '<div class="order-meta">'
            + '<span class="meta-item"><span class="meta-label">Date</span><span class="meta-val">' + date + '</span></span>'
            + '<span class="meta-item"><span class="meta-label">Qty</span><span class="meta-val">' + o.qty + '</span></span>'
            + '<span class="meta-item"><span class="meta-label">Unit</span><span class="meta-val">$' + Number(o.unit_price).toFixed(2) + '</span></span>'
            + (o.shipping_carrier ? '<span class="meta-item"><span class="meta-label">Via</span><span class="meta-val">' + o.shipping_carrier + '</span></span>' : '')
            + '</div></div>'
            + '<div class="order-right"><div class="order-total">$' + Number(o.total).toFixed(2) + '</div>'
            + '<a href="product.html?id=' + o.product_id + '" class="review-link">★ Write a Review</a>'
            + '</div></div>';
        }).join('')
        + '</div>'
      ).join('');
    }
  </script>
</body>
</html>
