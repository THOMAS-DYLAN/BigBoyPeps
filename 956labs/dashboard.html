<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://azgqvcnkhifmqdbssalt.supabase.co" crossorigin>
  <link rel="preconnect" href="https://utqviljholfvpfztfuvx.supabase.co" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — 956 Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="modulepreload" href="../js/supabase.js">
  <link rel="modulepreload" href="../js/auth.js?v=15">
  <link rel="modulepreload" href="../js/cart.js?v=18">
  <link rel="modulepreload" href="../js/products.js?v=15">
  <link rel="stylesheet" href="css/global.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .container { max-width: 1140px; margin: 0 auto; padding: 0 16px; }

    .dash-header {
      background: var(--off); border-bottom: 1px solid var(--border);
      padding: 44px 0 32px; position: relative; overflow: hidden;
    }
    .dash-header::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(to right, var(--green) 33.3%, rgba(255,255,255,.1) 33.3% 66.6%, var(--red) 66.6%);
    }
    .dash-header-inner { position: relative; z-index: 1; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
    .dash-greeting { font-family: var(--font-d); font-size: clamp(1.8rem,4vw,3rem); line-height: .95; letter-spacing: .03em; color: var(--white); }
    .dash-greeting em { color: var(--green); font-style: normal; }
    .dash-since { font-family: var(--font-c); font-size: .65rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--smoke); margin-top: 6px; }
    .member-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font-c); font-size: .6rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      background: rgba(0,104,71,.12); color: var(--green-hi);
      border: 1px solid rgba(0,104,71,.22); padding: 5px 12px; border-radius: 999px;
    }

    .dash-body { padding: 36px 0 80px; flex: 1; }
    .dash-grid { display: grid; grid-template-columns: 1fr 360px; gap: 28px; align-items: start; }

    .section-title { font-family: var(--font-d); font-size: 1.5rem; letter-spacing: .04em; color: var(--white); margin-bottom: 20px; }
    .section-title em { color: var(--green); font-style: normal; }

    .account-panel { background: var(--off); border: 1px solid var(--border); margin-bottom: 24px; border-radius: 2px; overflow: hidden; }
    .info-row { display: flex; align-items: center; gap: 14px; padding: 13px 20px; border-bottom: 1px solid var(--border); min-height: 52px; }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-family: var(--font-c); font-size: .6rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--smoke); width: 110px; flex-shrink: 0; }
    .info-val { font-size: .88rem; color: var(--text); flex: 1; }
    .info-val.empty { color: var(--smoke); font-style: italic; }
    .info-val.locked { color: var(--text-3); }
    .info-edit-btn { font-family: var(--font-c); font-size: .6rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--smoke); padding: 4px 10px; border: 1px solid var(--border); border-radius: 2px; transition: all .18s; margin-left: auto; }
    .info-edit-btn:hover { border-color: var(--green); color: var(--green-hi); }
    .info-edit-wrap { display: none; flex: 1; gap: 8px; align-items: center; }
    .info-edit-wrap.open { display: flex; }
    .info-edit-wrap.open ~ div { display: none; }
    .info-edit-wrap.open ~ button { display: none; }
    .info-input { flex: 1; padding: 7px 10px; font-size: .85rem; background: var(--card); border: 1px solid var(--border); color: var(--white); border-radius: 2px; outline: none; min-width: 0; }
    .info-input:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(0,104,71,.15); }
    .info-save { font-family: var(--font-c); font-size: .6rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; background: var(--green); color: #fff; padding: 5px 12px; border-radius: 2px; white-space: nowrap; transition: background .18s; }
    .info-save:hover { background: var(--green-hi); }
    .info-cancel { font-family: var(--font-c); font-size: .6rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; background: transparent; color: var(--smoke); padding: 5px 10px; border: 1px solid var(--border); border-radius: 2px; white-space: nowrap; }
    .info-cancel:hover { border-color: var(--red); color: var(--red-hi); }
    .section-label { padding: 12px 20px 6px; font-family: var(--font-c); font-size: .58rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--smoke); border-bottom: 1px solid var(--border); }

    .order-card { display: flex; gap: 12px; align-items: center; background: var(--card); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 8px; border-radius: 2px; transition: border-color .18s; }
    .order-card:hover { border-color: var(--green-lo); }
    .order-card-thumb { width: 48px; height: 48px; background: var(--off); border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .order-card-thumb img { width: 38px; height: 38px; object-fit: contain; }
    .order-card-body { flex: 1; min-width: 0; }
    .order-card-header { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 4px; flex-wrap: wrap; }
    .order-card-name { font-family: var(--font-c); font-size: .86rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--white); }
    .order-card-total { font-family: var(--font-d); font-size: 1.1rem; letter-spacing: .04em; color: var(--white); flex-shrink: 0; }
    .order-card-bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
    .order-card-meta { display: flex; gap: 14px; flex-wrap: wrap; }
    .order-card-meta-item { display: flex; flex-direction: column; gap: 1px; }
    .order-card-meta-label { font-family: var(--font-c); font-size: .56rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--smoke); }
    .order-card-meta-val { font-family: var(--font-c); font-size: .72rem; font-weight: 600; color: var(--text); }
    .order-review-link { font-family: var(--font-c); font-size: .58rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--green-hi); text-decoration: underline; text-underline-offset: 3px; white-space: nowrap; }
    .orders-empty { font-size: .84rem; color: var(--smoke); padding: 20px 0; line-height: 1.7; }
    .orders-empty a { color: var(--green-hi); }

    .orders-more-link { display: block; font-family: var(--font-c); font-size: .65rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--smoke); text-decoration: underline; text-underline-offset: 3px; margin-top: 12px; transition: color .18s; }
    .orders-more-link:hover { color: var(--green-hi); }

    @media (max-width: 900px) { .dash-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="nav-mount"></div>
  <div id="banner-mount"></div>

  <div class="dash-header">
    <div class="container">
      <div class="dash-header-inner">
        <div>
          <div class="dash-greeting">Hola, <em id="dash-name">Researcher.</em></div>
          <div class="dash-since" id="dash-since">Member since —</div>
        </div>
        <div class="member-badge">✦ Active Member</div>
      </div>
    </div>
  </div>

  <div class="dash-body">
    <div class="container">
      <div class="dash-grid">
        <div>
          <div class="section-title">Account <em>Settings</em></div>
          <div class="account-panel" id="account-panel"><p style="padding:20px;color:var(--smoke);font-size:.84rem">Loading…</p></div>
        </div>
        <div>
          <div class="section-title">Recent <em>Orders</em></div>
          <div id="orders-panel"><p style="color:var(--smoke);font-size:.84rem">Loading…</p></div>
          <a href="orders.html" class="orders-more-link">View all orders →</a>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-mount"></div>

  <script type="module">
    import '../js/auth.js?v=15';
    import '../js/cart.js?v=18';
    import { loadProducts, getProduct, miniPepperSVG } from '../js/products.js?v=15';

    let profile = {}, recentOrders = [], defaultAddr = null;
    const _r = await Promise.all([
      window.initPage('dashboard'),
      loadProducts(),
      Auth.getProfile(),
      Auth.getRecentOrders(),
      Auth.getDefaultAddress(),
    ]);
    profile      = _r[2] || {};
    recentOrders = _r[3] || [];
    defaultAddr  = _r[4] || null;

    const firstName = profile?.first_name || '';
    const lastName  = profile?.last_name  || '';
    document.getElementById('dash-name').textContent = (firstName + (lastName ? ' ' + lastName : '') || 'Researcher') + '.';
    document.getElementById('dash-since').textContent = 'Member since ' + Auth.formatDate(profile?.member_since);

    // Orders panel
    const ordersPanel = document.getElementById('orders-panel');
    if (!recentOrders.length) {
      ordersPanel.innerHTML = '<div class="orders-empty">No orders yet.<br/><a href="shop.html">Browse the catalog →</a></div>';
    } else {
      ordersPanel.innerHTML = recentOrders.map(o => {
        const product = getProduct(o.product_id);
        const imgHtml = product?.images ? '<img src="../pdct img/' + product.images + '" alt="' + o.product_name + '" />' : (product ? miniPepperSVG(product) : '');
        const date    = new Date(o.ordered_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
        return '<div class="order-card">'
          + '<div class="order-card-thumb">' + imgHtml + '</div>'
          + '<div class="order-card-body">'
          + '<div class="order-card-header"><div class="order-card-name">' + o.product_name + '</div><div class="order-card-total">$' + Number(o.total).toFixed(2) + '</div></div>'
          + '<div class="order-card-bottom">'
          + '<div class="order-card-meta">'
          + '<span class="order-card-meta-item"><span class="order-card-meta-label">Date</span><span class="order-card-meta-val">' + date + '</span></span>'
          + '<span class="order-card-meta-item"><span class="order-card-meta-label">Qty</span><span class="order-card-meta-val">' + o.qty + '</span></span>'
          + (o.shipping_carrier ? '<span class="order-card-meta-item"><span class="order-card-meta-label">Via</span><span class="order-card-meta-val">' + o.shipping_carrier + '</span></span>' : '')
          + '</div>'
          + '<a href="product.html?id=' + o.product_id + '" class="order-review-link">★ Review</a>'
          + '</div></div></div>';
      }).join('');
    }

    const defaultAddrId = defaultAddr?.id || null;

    const PROFILE_FIELDS = [
      { key:'email',      label:'Email',      type:'email', placeholder:'you@example.com' },
      { key:'first_name', label:'First Name', type:'text',  placeholder:'Jane'  },
      { key:'last_name',  label:'Last Name',  type:'text',  placeholder:'Smith' },
      { key:'phone',      label:'Phone',      type:'tel',   placeholder:'+1 555 000 0000' },
    ];
    const ADDRESS_FIELDS = [
      { key:'street_line1', label:'Street',    type:'text', placeholder:'123 Main St' },
      { key:'street_line2', label:'Apt/Suite', type:'text', placeholder:'Apt 4B'      },
      { key:'city',         label:'City',      type:'text', placeholder:'McAllen'     },
      { key:'state',        label:'State',     type:'text', placeholder:'TX'          },
      { key:'zip',          label:'ZIP',       type:'text', placeholder:'78501'       },
      { key:'country',      label:'Country',   type:'text', placeholder:'US'          },
    ];

    function makeInfoRow(f, val) {
      return '<div class="info-row">'
        + '<div class="info-label">' + f.label + '</div>'
        + '<div class="info-edit-wrap" id="wrap-' + f.key + '">'
        + '<input class="info-input" id="input-' + f.key + '" type="' + f.type + '" value="' + (val || '') + '" placeholder="' + f.placeholder + '" />'
        + '<button class="info-save" onclick="saveField(\'' + f.key + '\')">Save</button>'
        + '<button class="info-cancel" onclick="cancelEdit(\'' + f.key + '\')">Cancel</button>'
        + '</div>'
        + '<div><div class="info-val' + (val ? '' : ' empty') + '" id="val-' + f.key + '">' + (val || 'Not set') + '</div></div>'
        + '<button class="info-edit-btn" onclick="startEdit(\'' + f.key + '\')">Edit</button>'
        + '</div>';
    }

    document.getElementById('account-panel').innerHTML =
      '<div class="section-label">Personal Info</div>'
      + PROFILE_FIELDS.map(f => makeInfoRow(f, profile?.[f.key] || '')).join('')
      + '<div class="info-row"><div class="info-label">Member Since</div><div class="info-val locked">' + Auth.formatDate(profile?.member_since) + '</div><span style="margin-left:auto;font-size:.9rem">🔒</span></div>'
      + '<div class="section-label" style="margin-top:8px">Default Shipping Address</div>'
      + ADDRESS_FIELDS.map(f => makeInfoRow({ ...f, key: 'addr_' + f.key }, defaultAddr?.[f.key] || '')).join('')
      + '<div style="padding:10px 20px 14px"><button onclick="saveAddress()" style="font-family:var(--font-c);font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:var(--green);color:#fff;padding:7px 16px;border-radius:2px;transition:background .18s" onmouseover="this.style.background=\'var(--green-hi)\'" onmouseout="this.style.background=\'var(--green)\'">Save Address</button></div>';

    window.startEdit  = k => { document.getElementById('wrap-'+k).classList.add('open'); document.getElementById('input-'+k).focus(); };
    window.cancelEdit = k => { document.getElementById('wrap-'+k).classList.remove('open'); };
    window.saveField  = async k => {
      const val = document.getElementById('input-'+k)?.value.trim() || '';
      if (k.startsWith('addr_')) {
        const fieldName = k.replace('addr_','');
        const current   = await Auth.getDefaultAddress() || {};
        const result    = await Auth.saveAddress({ id: current.id||null, label:'Default', first_name: current.first_name||'', last_name: current.last_name||'', street_line1: current.street_line1||'', street_line2: current.street_line2||'', city: current.city||'', state: current.state||'', zip: current.zip||'', country: current.country||'US', is_default: true, [fieldName]: val });
        if (!result.ok) return;
        const el = document.getElementById('val-'+k);
        if (el) { el.textContent = val || 'Not set'; el.className = 'info-val' + (val ? '' : ' empty'); }
        cancelEdit(k); return;
      }
      await Auth.updateField(k, val);
      const el = document.getElementById('val-'+k);
      if (el) { el.textContent = val || 'Not set'; el.className = 'info-val' + (val ? '' : ' empty'); }
      cancelEdit(k);
      if (k === 'first_name' || k === 'last_name') {
        const p = await Auth.getProfile();
        document.getElementById('dash-name').textContent = ((p?.first_name||'') + (p?.last_name ? ' '+p.last_name : '') || 'Researcher') + '.';
      }
    };
    window.saveAddress = async () => {
      const get = k => (document.getElementById('input-addr_'+k)?.value.trim() || '');
      const addr = { id: defaultAddrId, label:'Default', first_name: profile?.first_name||'', last_name: profile?.last_name||'', street_line1: get('street_line1'), street_line2: get('street_line2'), city: get('city'), state: get('state'), zip: get('zip'), country: get('country') || 'US', is_default: true };
      const result = await Auth.saveAddress(addr);
      if (result.ok) {
        ['street_line1','street_line2','city','state','zip','country'].forEach(k => {
          const el = document.getElementById('val-addr_'+k);
          const val = addr[k];
          if (el) { el.textContent = val || 'Not set'; el.className = 'info-val' + (val ? '' : ' empty'); }
          document.getElementById('wrap-addr_'+k)?.classList.remove('open');
        });
      }
    };
  </script>
</body>
</html>
